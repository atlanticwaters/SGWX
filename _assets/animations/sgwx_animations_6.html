<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Field — Vivid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #021a14; overflow: hidden; }
  canvas { display: block; }
  /* Lighter vignette — just soft edges, not crushing the scene */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background:
      radial-gradient(ellipse 90% 70% at 50% 55%, transparent 45%, rgba(2,20,12,0.5) 75%, rgba(1,12,8,0.85) 100%),
      linear-gradient(to bottom, rgba(2,20,12,0.5) 0%, transparent 14%, transparent 80%, rgba(1,12,8,0.7) 100%);
  }
  #grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 6; opacity: 0.04; mix-blend-mode: screen;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
</style>
</head>
<body>
<div id="vignette"></div>
<div id="grain"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x021a14, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
// Lighter fog — let the far field stay visible with color
scene.fog = new THREE.FogExp2(0x021a14, 0.010);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(-10, 28, 90);
camera.lookAt(0, -5, -30);

// ─── Grid ────────────────────────────────────────────────────────────────────
const COLS    = 110;
const ROWS    = 80;
const SPACING = 1.8;
const W       = COLS * SPACING;
const D       = ROWS * SPACING;
const COUNT   = COLS * ROWS;

// ─── Wave ────────────────────────────────────────────────────────────────────
function waveHeight(x, z, t) {
  const nx = x / W, nz = z / D;
  const w1 = Math.sin(nx * 6.0  + nz * 3.5  - t * 1.1) * 7.0;
  const w2 = Math.sin(nx * 12.0 - nz * 5.0  + t * 0.7) * 3.2;
  const w3 = Math.sin(nx * 22.0 + nz * 18.0 - t * 1.8) * 1.1;
  const w4 = Math.sin((nx + nz)  * 4.5       + t * 0.4) * 4.5;
  return w1 + w2 + w3 + w4;
}
const HMIN = -(7.0 + 3.2 + 1.1 + 4.5);
const HMAX =   7.0 + 3.2 + 1.1 + 4.5;

// ─── Attributes ──────────────────────────────────────────────────────────────
const geo       = new THREE.BufferGeometry();
const positions = new Float32Array(COUNT * 3);
const heights   = new Float32Array(COUNT);
// Per-vertex "hue band" — assigns each node to a color zone so the palette
// varies across the grid and doesn't all converge to the same teal
const hueBand   = new Float32Array(COUNT);
const isGold    = new Float32Array(COUNT);

let idx = 0;
for (let row = 0; row < ROWS; row++) {
  for (let col = 0; col < COLS; col++) {
    const x = (col / (COLS - 1) - 0.5) * W;
    const z = (row / (ROWS - 1) - 0.5) * D - 20;
    positions[idx * 3]     = x;
    positions[idx * 3 + 1] = 0;
    positions[idx * 3 + 2] = z;

    // Hue band: slow diagonal gradient across the grid (0→1)
    // Creates stripes of blue-green, teal-green, and warm green
    hueBand[idx] = ((col / COLS) * 0.6 + (row / ROWS) * 0.4 + Math.random() * 0.12);
    hueBand[idx] = Math.min(1.0, Math.max(0.0, hueBand[idx]));

    const cBias = 1 - Math.abs(col / COLS - 0.5) * 2;
    isGold[idx] = Math.random() < 0.08 * (0.4 + cBias) ? 1 : 0;
    idx++;
  }
}

geo.setAttribute('position', new THREE.BufferAttribute(positions, 3).setUsage(THREE.DynamicDrawUsage));
geo.setAttribute('aHeight',  new THREE.BufferAttribute(heights,   1).setUsage(THREE.DynamicDrawUsage));
geo.setAttribute('aHue',     new THREE.BufferAttribute(hueBand,   1));
geo.setAttribute('aGold',    new THREE.BufferAttribute(isGold,    1));

// ─── Main particle shader — full vivid palette ────────────────────────────────
const mat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float aHeight;
    attribute float aHue;
    attribute float aGold;
    varying float vH;
    varying float vHue;
    varying float vGold;
    void main() {
      vH    = aHeight;
      vHue  = aHue;
      vGold = aGold;
      // Crests: big and bold. Troughs still visible — not invisible.
      float sz = mix(1.8, 8.5, aHeight) * mix(1.0, 2.4, aGold);
      gl_PointSize = sz;
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vH;
    varying float vHue;
    varying float vGold;

    // Simple 3-stop color ramp per channel
    vec3 ramp(float h, vec3 a, vec3 b, vec3 c) {
      return h < 0.5 ? mix(a, b, h * 2.0) : mix(b, c, (h - 0.5) * 2.0);
    }

    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv);
      if (d > 0.5) discard;

      float core = 1.0 - smoothstep(0.0, 0.18, d);
      float halo = 1.0 - smoothstep(0.1,  0.5,  d);
      float brightness = core * 1.0 + halo * 0.5;

      // Three hue bands across the grid:
      // band≈0 → deep ocean blue-green
      // band≈0.5 → vivid emerald / lime green
      // band≈1 → warm yellow-green
      vec3 troughA = vec3(0.02, 0.20, 0.35);   // deep blue-teal
      vec3 troughB = vec3(0.03, 0.30, 0.18);   // dark emerald
      vec3 troughC = vec3(0.10, 0.28, 0.06);   // dark olive

      vec3 midA    = vec3(0.04, 0.55, 0.82);   // bright cyan-blue
      vec3 midB    = vec3(0.08, 0.80, 0.42);   // vivid green
      vec3 midC    = vec3(0.42, 0.85, 0.12);   // lime

      vec3 crestA  = vec3(0.45, 0.95, 1.00);   // ice blue-white
      vec3 crestB  = vec3(0.70, 1.00, 0.72);   // bright mint-white
      vec3 crestC  = vec3(0.98, 1.00, 0.55);   // hot yellow-white

      vec3 trough  = ramp(vHue, troughA, troughB, troughC);
      vec3 mid     = ramp(vHue, midA,    midB,    midC);
      vec3 crest   = ramp(vHue, crestA,  crestB,  crestC);

      // Wave height drives brightness up the ramp
      vec3 waveCol = vH < 0.5
        ? mix(trough, mid,   vH * 2.0)
        : mix(mid,   crest, (vH - 0.5) * 2.0);

      // Gold nodes override to warm yellow, brightest at crests
      vec3 goldCol = mix(vec3(0.6, 0.4, 0.05), vec3(1.0, 0.92, 0.28), vH);
      vec3 col = mix(waveCol, goldCol, vGold);

      // Troughs are now 50% alpha (was 35%), crests hit 1.0
      float alpha = brightness * mix(0.50, 1.0, vH) * mix(1.0, 1.5, vGold);
      alpha = clamp(alpha, 0.0, 1.0);

      gl_FragColor = vec4(col, alpha);
    }
  `,
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
});
scene.add(new THREE.Points(geo, mat));

// ─── Bloom halo layer — bigger, brighter than v3 ─────────────────────────────
const SPARSE    = Math.floor(COUNT / 14);  // denser than v3's /18
const sparseGeo = new THREE.BufferGeometry();
const sPos      = new Float32Array(SPARSE * 3);
const sH        = new Float32Array(SPARSE);
const sHue      = new Float32Array(SPARSE);
sparseGeo.setAttribute('position', new THREE.BufferAttribute(sPos,  3).setUsage(THREE.DynamicDrawUsage));
sparseGeo.setAttribute('aHeight',  new THREE.BufferAttribute(sH,    1).setUsage(THREE.DynamicDrawUsage));
sparseGeo.setAttribute('aHue',     new THREE.BufferAttribute(sHue,  1).setUsage(THREE.DynamicDrawUsage));

const sparseMat = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: `
    attribute float aHeight;
    attribute float aHue;
    varying float vH;
    varying float vHue;
    void main() {
      vH   = aHeight;
      vHue = aHue;
      // Bloom halos only appear on the upper half of the wave
      gl_PointSize = mix(0.0, 42.0, pow(max(0.0, aHeight - 0.3) / 0.7, 2.0));
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vH;
    varying float vHue;
    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv) * 2.0;
      float a  = pow(1.0 - smoothstep(0.0, 1.0, d), 2.2) * vH * 0.30;

      // Match hue bands of main layer
      vec3 colA = vec3(0.04, 0.60, 0.90);   // cyan
      vec3 colB = vec3(0.12, 0.90, 0.45);   // green
      vec3 colC = vec3(0.80, 1.00, 0.30);   // yellow-lime
      vec3 col  = vHue < 0.5
        ? mix(colA, colB, vHue * 2.0)
        : mix(colB, colC, (vHue - 0.5) * 2.0);

      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Points(sparseGeo, sparseMat));

const sparseIdx = Array.from({ length: SPARSE }, () => Math.floor(Math.random() * COUNT));

// Pre-populate sHue from main hueBand
for (let s = 0; s < SPARSE; s++) {
  sHue[s] = hueBand[sparseIdx[s]];
}
sparseGeo.attributes.aHue.needsUpdate = true;

// ─── Deep background ambient glow blobs ───────────────────────────────────────
// Larger, brighter blobs than v3 — vivid teal & green pools of light
const BLOB_COUNT = 10;
const blobGeo    = new THREE.BufferGeometry();
const bPos       = new Float32Array(BLOB_COUNT * 3);
const bHue       = new Float32Array(BLOB_COUNT);
const bPhase     = new Float32Array(BLOB_COUNT);
for (let i = 0; i < BLOB_COUNT; i++) {
  bPos[i*3]   = (Math.random() - 0.5) * W * 0.85;
  bPos[i*3+1] = (Math.random() - 0.5) * 15 - 5;
  bPos[i*3+2] = (Math.random() - 0.5) * D * 0.6 - 20;
  bHue[i]     = Math.random();
  bPhase[i]   = Math.random() * Math.PI * 2;
}
blobGeo.setAttribute('position', new THREE.BufferAttribute(bPos,   3));
blobGeo.setAttribute('aHue',     new THREE.BufferAttribute(bHue,   1));
blobGeo.setAttribute('aPhase',   new THREE.BufferAttribute(bPhase, 1));

const blobMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float aPhase;
    uniform float uTime;
    varying float vPhase;
    attribute float aHue;
    varying float vHue;
    void main() {
      vPhase = aPhase;
      vHue   = aHue;
      float breathe = 1.0 + 0.15 * sin(uTime * 0.35 + aPhase);
      gl_PointSize = 380.0 * breathe;
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vPhase;
    varying float vHue;
    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv) * 2.0;
      float a  = pow(1.0 - smoothstep(0.0, 1.0, d), 3.0) * 0.28;
      // Vivid blob colors keyed to hue band
      vec3 colA = vec3(0.02, 0.30, 0.28);  // deep teal
      vec3 colB = vec3(0.04, 0.35, 0.12);  // deep green
      vec3 colC = vec3(0.12, 0.28, 0.04);  // olive-dark
      vec3 col  = vHue < 0.5
        ? mix(colA, colB, vHue * 2.0)
        : mix(colB, colC, (vHue - 0.5) * 2.0);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Points(blobGeo, blobMat));

// ─── Mouse ───────────────────────────────────────────────────────────────────
const mouse = { x: 0, y: 0 };
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth  - 0.5) * 2;
  mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ─── Cached base positions ────────────────────────────────────────────────────
const baseX = new Float32Array(COUNT);
const baseZ = new Float32Array(COUNT);
for (let i = 0; i < COUNT; i++) {
  baseX[i] = positions[i * 3];
  baseZ[i] = positions[i * 3 + 2];
}

// ─── Animate ─────────────────────────────────────────────────────────────────
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.006;

  mat.uniforms.uTime.value    = t;
  blobMat.uniforms.uTime.value = t;

  const pos   = geo.attributes.position;
  const hAttr = geo.attributes.aHeight;

  for (let i = 0; i < COUNT; i++) {
    const h  = waveHeight(baseX[i], baseZ[i], t);
    const hn = (h - HMIN) / (HMAX - HMIN);
    pos.setY(i, h);
    hAttr.setX(i, hn);
  }
  pos.needsUpdate   = true;
  hAttr.needsUpdate = true;

  // Bloom layer sync
  const sp  = sparseGeo.attributes.position;
  const shA = sparseGeo.attributes.aHeight;
  for (let s = 0; s < SPARSE; s++) {
    const i = sparseIdx[s];
    sp.setXYZ(s, baseX[i], pos.getY(i) + 0.6, baseZ[i]);
    shA.setX(s, hAttr.getX(i));
  }
  sp.needsUpdate  = true;
  shA.needsUpdate = true;

  // Camera drift
  const camX = -10 + mouse.x * 6 + Math.sin(t * 0.12) * 5;
  const camY =  28 - mouse.y * 4 + Math.sin(t * 0.07) * 2;
  const camZ =  90 + Math.cos(t * 0.09) * 8;
  camera.position.x += (camX - camera.position.x) * 0.03;
  camera.position.y += (camY - camera.position.y) * 0.03;
  camera.position.z += (camZ - camera.position.z) * 0.03;
  camera.lookAt(mouse.x * 3, -6 + mouse.y * 2, -30);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
