<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe City — Under Construction</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #010e0a; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background:
      radial-gradient(ellipse 90% 80% at 50% 45%, transparent 35%, rgba(1,12,8,0.45) 68%, rgba(1,8,5,0.86) 100%),
      linear-gradient(to bottom, rgba(1,12,8,0.55) 0%, transparent 14%, transparent 82%, rgba(1,8,5,0.78) 100%);
  }
  #grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 6;
    opacity: 0.04; mix-blend-mode: screen;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  #hud {
    position: fixed; bottom: 42px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none; z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 9px;
    min-width: 280px;
  }
  #phase-tag {
    font-size: 8px; letter-spacing: 0.55em; text-transform: uppercase;
    color: rgba(100,220,160,0.45); transition: opacity 0.6s;
  }
  #district-label {
    font-size: 12px; letter-spacing: 0.38em; text-transform: uppercase;
    color: rgba(200,255,220,0.0); transition: color 1.0s;
  }
  #district-label.show { color: rgba(200,255,220,0.85); }
  #draw-bar {
    width: 180px; height: 1px; background: rgba(255,255,255,0.09);
    position: relative; overflow: hidden;
  }
  #draw-fill {
    position: absolute; left: -100%; top: 0;
    width: 100%; height: 100%;
    background: rgba(160,255,200,0.6);
  }
  #district-dots {
    display: flex; gap: 10px;
  }
  .ddot {
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: background 0.7s, transform 0.4s;
  }
  .ddot.active {
    background: rgba(180,255,210,0.9);
    transform: scale(1.6);
  }
  .ddot.done { background: rgba(100,180,130,0.55); }
</style>
</head>
<body>
<div id="vignette"></div>
<div id="grain"></div>
<div id="hud">
  <div id="phase-tag">Initializing Grid</div>
  <div id="district-label">——</div>
  <div id="draw-bar"><div id="draw-fill"></div></div>
  <div id="district-dots">
    <div class="ddot" id="dot-0"></div>
    <div class="ddot" id="dot-1"></div>
    <div class="ddot" id="dot-2"></div>
    <div class="ddot" id="dot-3"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x010e0a, 1);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0x010e0a, 0.0075);

const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 900);
camera.position.set(0, 145, 210);
camera.lookAt(0, 0, -10);

// ─── Geometry helpers ─────────────────────────────────────────────────────────
function L(a, x1,y1,z1, x2,y2,z2){ a.push(x1,y1,z1, x2,y2,z2); }

function box(a, cx,cy,cz, w,h,d, sw=0, sh=0){
  const [x0,x1,y0,y1,z0,z1]=[cx-w/2,cx+w/2,cy,cy+h,cz-d/2,cz+d/2];
  L(a,x0,y0,z0,x1,y0,z0); L(a,x1,y0,z0,x1,y0,z1); L(a,x1,y0,z1,x0,y0,z1); L(a,x0,y0,z1,x0,y0,z0);
  L(a,x0,y1,z0,x1,y1,z0); L(a,x1,y1,z0,x1,y1,z1); L(a,x1,y1,z1,x0,y1,z1); L(a,x0,y1,z1,x0,y1,z0);
  L(a,x0,y0,z0,x0,y1,z0); L(a,x1,y0,z0,x1,y1,z0); L(a,x1,y0,z1,x1,y1,z1); L(a,x0,y0,z1,x0,y1,z1);
  for(let i=1;i<sw;i++){const xp=x0+(w/sw)*i; L(a,xp,y0,z0,xp,y1,z0); L(a,xp,y0,z1,xp,y1,z1);}
  for(let i=1;i<sh;i++){const yp=y0+(h/sh)*i;
    L(a,x0,yp,z0,x1,yp,z0); L(a,x0,yp,z1,x1,yp,z1);
    L(a,x0,yp,z0,x0,yp,z1); L(a,x1,yp,z0,x1,yp,z1);}
}

function gable(a, cx,cy,cz, w,d, ph){
  const [x0,x1,z0,z1]=[cx-w/2,cx+w/2,cz-d/2,cz+d/2];
  L(a,x0,cy,z0,cx,cy+ph,z0); L(a,x1,cy,z0,cx,cy+ph,z0);
  L(a,x0,cy,z1,cx,cy+ph,z1); L(a,x1,cy,z1,cx,cy+ph,z1);
  L(a,cx,cy+ph,z0,cx,cy+ph,z1);
  L(a,x0,cy,z0,x0,cy,z1); L(a,x1,cy,z0,x1,cy,z1);
}

function cyl(a, cx,cy,cz, r,h, seg=10, rings=3){
  const pts=[];
  for(let ri=0;ri<=rings;ri++){
    const y=cy+(ri/rings)*h, row=[];
    for(let s=0;s<seg;s++){const ang=(s/seg)*Math.PI*2; row.push([cx+Math.cos(ang)*r,y,cz+Math.sin(ang)*r]);}
    pts.push(row);
    for(let s=0;s<seg;s++) L(a,...row[s],...row[(s+1)%seg]);
  }
  for(let s=0;s<seg;s++) L(a,...pts[0][s],...pts[rings][s]);
}

function circle(a, cx,cy,cz, r, seg=20, axis='y'){
  for(let s=0;s<seg;s++){
    const a0=(s/seg)*Math.PI*2, a1=((s+1)/seg)*Math.PI*2;
    if(axis==='y') L(a, cx+Math.cos(a0)*r,cy,cz+Math.sin(a0)*r, cx+Math.cos(a1)*r,cy,cz+Math.sin(a1)*r);
    else            L(a, cx+Math.cos(a0)*r,cy+Math.sin(a0)*r,cz, cx+Math.cos(a1)*r,cy+Math.sin(a1)*r,cz);
  }
}

function ellipse(a, cx,cy,cz, rx,rz, seg=32){
  for(let s=0;s<seg;s++){
    const a0=(s/seg)*Math.PI*2, a1=((s+1)/seg)*Math.PI*2;
    L(a, cx+Math.cos(a0)*rx,cy,cz+Math.sin(a0)*rz, cx+Math.cos(a1)*rx,cy,cz+Math.sin(a1)*rz);
  }
}

function makeLines(arr, col, opacity=0.9){
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(arr),3));
  geo.setDrawRange(0,0); // start invisible
  const mat = new THREE.LineBasicMaterial({
    color:col, transparent:true, opacity,
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  const mesh = new THREE.LineSegments(geo,mat);
  scene.add(mesh);
  return { geo, mat, mesh, totalVerts:arr.length/3, drawnVerts:0 };
}

// ─── GROUND GRID (permanent, draws in slowly at start) ────────────────────────
const groundArr=[];
const GS=6, GW=32, GD=30;
for(let i=-GW;i<=GW;i++) L(groundArr, i*GS,0,-GD*GS, i*GS,0,GD*GS);
for(let i=-GD;i<=GD;i++) L(groundArr, -GW*GS,0,i*GS, GW*GS,0,i*GS);
const groundLines = makeLines(groundArr, 0x0a3020, 0.4);

// ─── INFRASTRUCTURE (roads, hub — also draws in early) ────────────────────────
const infraArr=[];
// Main roads
L(infraArr,-190,0.2,0, 190,0.2,0); L(infraArr,-3,0.2,0, -3,0.2,0);
L(infraArr,0,0.2,-190, 0,0.2,190);
for(let l=-1;l<=1;l+=2){ L(infraArr,-190,0.3,l*3.5,190,0.3,l*3.5); L(infraArr,l*3.5,0.3,-190,l*3.5,0.3,190); }
// Overpass
for(let i=0;i<12;i++){
  const t=i/11, t1=(i+1)/11;
  const ox0=-40+t*100, oz0=55-t*95, oy0=7+Math.sin(t*Math.PI)*10;
  const ox1=-40+t1*100,oz1=55-t1*95,oy1=7+Math.sin(t1*Math.PI)*10;
  L(infraArr,ox0,oy0,oz0, ox1,oy1,oz1);
  L(infraArr,ox0,0,oz0, ox0,oy0,oz0);
}
// Central hub
cyl(infraArr,0,0,0,11,5,12,2);
cyl(infraArr,0,5,0,6,22,8,5);
L(infraArr,0,27,0,0,38,0); circle(infraArr,0,30,0,4,10);
for(let b=0;b<4;b++){const ba=(b/4)*Math.PI*2; L(infraArr,Math.cos(ba)*11,5,Math.sin(ba)*11,Math.cos(ba)*28,5,Math.sin(ba)*28);}
const infraLines = makeLines(infraArr, 0x0d4530, 0.45);

// ─────────────────────────────────────────────────────────────────────────────
// DISTRICT 0 — AGRICULTURE  (left-back)  color: warm yellow-green
// ─────────────────────────────────────────────────────────────────────────────
const farmArr=[];
{
  const OX=-68,OZ=32;
  // Field furrows
  for(let row=0;row<10;row++){
    const fz=OZ-26+row*5.5;
    for(let seg=0;seg<15;seg++){
      const x0=OX-34+seg*4.5, x1=x0+4.5;
      L(farmArr,x0,Math.sin(seg*0.5+row)*0.4,fz, x1,Math.sin((seg+1)*0.5+row)*0.4,fz);
    }
  }
  // Irrigation channels
  for(let c=0;c<7;c++){ const fx=OX-34+c*11.5; L(farmArr,fx,0,OZ-28,fx,0,OZ+28); }
  // Barn
  box(farmArr, OX+14,0,OZ+2, 18,10,12);
  gable(farmArr, OX+14,10,OZ+2, 18,12,6);
  L(farmArr,OX+5,0,OZ-5,OX+5,6,OZ-5); L(farmArr,OX+23,0,OZ-5,OX+23,6,OZ-5); L(farmArr,OX+5,6,OZ-5,OX+23,6,OZ-5);
  // Silos
  cyl(farmArr,OX+28,0,OZ+4,4,22,10,6); circle(farmArr,OX+28,22,OZ+4,4,10);
  for(let s=0;s<10;s++) L(farmArr,OX+28+Math.cos(s/10*Math.PI*2)*4,22,OZ+4+Math.sin(s/10*Math.PI*2)*4, OX+28,26,OZ+4);
  cyl(farmArr,OX+22,0,OZ+4,3.2,18,10,4); for(let s=0;s<10;s++) L(farmArr,OX+22+Math.cos(s/10*Math.PI*2)*3.2,18,OZ+4+Math.sin(s/10*Math.PI*2)*3.2,OX+22,22,OZ+4);
  // Windmill
  const wx=OX-18,wz=OZ+8;
  L(farmArr,wx,0,wz,wx,25,wz);
  for(let i=0;i<4;i++){const y=i*6; L(farmArr,wx-1.5,y,wz,wx+1.5,y+3,wz); L(farmArr,wx+1.5,y,wz,wx-1.5,y+3,wz);}
  const bL=9,bY=25;
  L(farmArr,wx,bY,wz,wx+bL,bY+2,wz); L(farmArr,wx,bY,wz,wx,bY+bL,wz);
  L(farmArr,wx,bY,wz,wx-bL,bY-2,wz); L(farmArr,wx,bY,wz,wx,bY-bL,wz);
  L(farmArr,wx+bL,bY+2,wz,wx,bY+bL,wz); L(farmArr,wx,bY+bL,wz,wx-bL,bY-2,wz);
  L(farmArr,wx-bL,bY-2,wz,wx,bY-bL,wz); L(farmArr,wx,bY-bL,wz,wx+bL,bY+2,wz);
  // Fence
  for(let i=0;i<14;i++){const fx=OX-38+i*5.5; L(farmArr,fx,0,OZ-30,fx,2,OZ-30); L(farmArr,fx+5.5,0,OZ-30,fx+5.5,0,OZ-30);}
  for(let i=0;i<14;i++){const fx=OX-38+i*5.5; L(farmArr,fx,2,OZ-30,fx+5.5,2,OZ-30); L(farmArr,fx,0,OZ-30,fx+5.5,0,OZ-30);}
  // Water tower
  cyl(farmArr,OX-30,8,OZ+15,4,5,8,2);
  for(let l=0;l<4;l++){const la=(l/4)*Math.PI*2; L(farmArr,OX-30+Math.cos(la)*4,8,OZ+15+Math.sin(la)*4,OX-30+Math.cos(la)*5.5,0,OZ+15+Math.sin(la)*5.5);}
  // Farm house
  box(farmArr,OX-8,0,OZ+14,10,7,8);
  gable(farmArr,OX-8,7,OZ+14,10,8,4);
}
const farmD = makeLines(farmArr, 0xd4e840, 0.88);

// ─────────────────────────────────────────────────────────────────────────────
// DISTRICT 1 — AUTO INDUSTRY  (right-back) color: electric blue
// ─────────────────────────────────────────────────────────────────────────────
const autoArr=[];
{
  const OX=62,OZ=28;
  // Main factory
  box(autoArr,OX-8,0,OZ,52,12,32,5,3);
  for(let i=0;i<5;i++){
    const rx=OX-32+i*11.5;
    L(autoArr,rx,12,OZ-16,rx+6,18,OZ-16); L(autoArr,rx+6,18,OZ-16,rx+11.5,12,OZ-16);
    L(autoArr,rx,12,OZ+16,rx+6,18,OZ+16); L(autoArr,rx+6,18,OZ+16,rx+11.5,12,OZ+16);
    L(autoArr,rx,12,OZ-16,rx,12,OZ+16);   L(autoArr,rx+6,18,OZ-16,rx+6,18,OZ+16);
  }
  // Smokestacks
  for(let s=0;s<3;s++){
    cyl(autoArr,OX-28+s*16,12,OZ-16,2,20,8,3);
    circle(autoArr,OX-28+s*16,32,OZ-16,3,12);
  }
  // Conveyors
  for(let lane=0;lane<3;lane++){
    const lz=OZ-10+lane*10;
    L(autoArr,OX-30,5,lz,OX+15,5,lz); L(autoArr,OX-30,5,lz+1,OX+15,5,lz+1);
    for(let l=0;l<5;l++){const lx=OX-30+l*11; L(autoArr,lx,0,lz,lx,5,lz); L(autoArr,lx,0,lz+1,lx,5,lz+1); L(autoArr,lx,5,lz,lx,5,lz+1);}
    for(let r=0;r<10;r++){const rx=OX-30+r*4.5; L(autoArr,rx,5.5,lz-0.5,rx,5.5,lz+1.5);}
  }
  // Cars
  [{x:OX+20,z:OZ-12},{x:OX+20,z:OZ},{x:OX+20,z:OZ+12}].forEach(({x,z})=>{
    box(autoArr,x,1,z,10,3,5);
    box(autoArr,x+0.5,4,z,7,2.5,4.5);
    [[x-3.5,z-2.5],[x+3.5,z-2.5],[x-3.5,z+2.5],[x+3.5,z+2.5]].forEach(([wx,wz])=>circle(autoArr,wx,1,wz,1.4,8,'x'));
    for(let g=0;g<3;g++) L(autoArr,x-5,1.5+g*0.8,z-2.5,x-5,1.5+g*0.8,z+2.5);
  });
  // Robot arms
  [{x:OX-28,z:OZ+18},{x:OX-10,z:OZ+18}].forEach(({x,z})=>{
    box(autoArr,x,0,z,2,3,2);
    L(autoArr,x,3,z,x+4,8,z); L(autoArr,x+4,8,z,x+6,13,z);
    L(autoArr,x+6,13,z,x+8,13,z-1); L(autoArr,x+6,13,z,x+8,13,z+1);
  });
  // Loading dock
  box(autoArr,OX+28,0,OZ,10,5,22,2,1);
}
const autoD = makeLines(autoArr, 0x20aaff, 0.88);

// ─────────────────────────────────────────────────────────────────────────────
// DISTRICT 2 — SPORTS STADIUM  (left-front) color: lime green
// ─────────────────────────────────────────────────────────────────────────────
const stadArr=[];
{
  const OX=-30,OZ=-42,RA=42,RB=28;
  // Bowl rings
  for(let ring=0;ring<6;ring++) ellipse(stadArr,OX,ring*4,OZ,RA-ring*3,RB-ring*2,36);
  // Ribs
  for(let rib=0;rib<24;rib++){
    const a=(rib/24)*Math.PI*2;
    L(stadArr,OX+Math.cos(a)*RA,0,OZ+Math.sin(a)*RB, OX+Math.cos(a)*(RA-14),20,OZ+Math.sin(a)*(RB-9));
  }
  // Field
  L(stadArr,OX-30,0.1,OZ-18,OX+30,0.1,OZ-18); L(stadArr,OX-30,0.1,OZ+18,OX+30,0.1,OZ+18);
  L(stadArr,OX-30,0.1,OZ-18,OX-30,0.1,OZ+18); L(stadArr,OX+30,0.1,OZ-18,OX+30,0.1,OZ+18);
  L(stadArr,OX,0.1,OZ-18,OX,0.1,OZ+18);
  circle(stadArr,OX,0.1,OZ,8,24,'y');
  // Penalty boxes
  L(stadArr,OX-30,0.1,OZ-7,OX-22,0.1,OZ-7); L(stadArr,OX-30,0.1,OZ+7,OX-22,0.1,OZ+7); L(stadArr,OX-22,0.1,OZ-7,OX-22,0.1,OZ+7);
  L(stadArr,OX+30,0.1,OZ-7,OX+22,0.1,OZ-7); L(stadArr,OX+30,0.1,OZ+7,OX+22,0.1,OZ+7); L(stadArr,OX+22,0.1,OZ-7,OX+22,0.1,OZ+7);
  // Light towers
  [[RA*0.82,RB*0.82],[-RA*0.82,RB*0.82],[RA*0.82,-RB*0.82],[-RA*0.82,-RB*0.82]].forEach(([tx,tz])=>{
    const tpx=OX+tx,tpz=OZ+tz;
    L(stadArr,tpx,0,tpz,tpx,28,tpz);
    L(stadArr,tpx-4,26,tpz,tpx+4,26,tpz); L(stadArr,tpx-4,28,tpz,tpx+4,28,tpz);
    for(let l=0;l<5;l++){const lx=tpx-4+l*2; L(stadArr,lx,28,tpz,lx+0.5,30,tpz); L(stadArr,lx,28,tpz,lx-0.5,30,tpz);}
    L(stadArr,tpx,0,tpz,tpx+4,14,tpz); L(stadArr,tpx,0,tpz,tpx-4,14,tpz);
  });
  // Scoreboard
  box(stadArr,OX,20,OZ-RB-2,20,8,4,4,2);
  L(stadArr,OX-10,0,OZ-RB-2,OX-8,20,OZ-RB-2); L(stadArr,OX+10,0,OZ-RB-2,OX+8,20,OZ-RB-2);
  // Canopy arc
  for(let s=0;s<22;s++){
    const a0=(-0.3+s/22*1.9)*Math.PI, a1=(-0.3+(s+1)/22*1.9)*Math.PI;
    L(stadArr, OX+Math.cos(a0)*(RA+2),21,OZ+Math.sin(a0)*(RB+2), OX+Math.cos(a1)*(RA+2),21,OZ+Math.sin(a1)*(RB+2));
    L(stadArr, OX+Math.cos(a0)*(RA-6),21,OZ+Math.sin(a0)*(RB-4), OX+Math.cos(a1)*(RA-6),21,OZ+Math.sin(a1)*(RB-4));
  }
}
const stadD = makeLines(stadArr, 0x30ff88, 0.88);

// ─────────────────────────────────────────────────────────────────────────────
// DISTRICT 3 — HIGH-TECH SKYSCRAPERS  (right-front) color: icy cyan
// ─────────────────────────────────────────────────────────────────────────────
const techArr=[];
{
  const OX=52,OZ=-40;
  // Tower A — tall
  box(techArr,OX-10,0,OZ-6,14,80,10,7,16);
  L(techArr,OX-10,80,OZ-6,OX-10,96,OZ-6);
  L(techArr,OX-10,88,OZ-6,OX-14,93,OZ-6); L(techArr,OX-10,88,OZ-6,OX-6,93,OZ-6);
  circle(techArr,OX-10,84,OZ-6,2,8);
  // Tower B — angled face
  box(techArr,OX+8,0,OZ-4,10,60,8,5,12);
  L(techArr,OX+3,0,OZ-8,OX+13,60,OZ-8); L(techArr,OX+3,0,OZ,OX+13,60,OZ);
  box(techArr,OX+10,60,OZ-4,6,8,4,2,4);
  // Tower C — slim
  box(techArr,OX-22,0,OZ+6,8,55,7,4,11);
  box(techArr,OX-22,40,OZ+6,5,15,4,2,5);
  // Tower D — podium + spire
  box(techArr,OX+4,0,OZ+16,22,12,16,6,3);
  box(techArr,OX+6,12,OZ+18,12,42,10,4,8);
  // Comm tower
  cyl(techArr,OX-30,0,OZ+20,1.5,35,6,6);
  circle(techArr,OX-30,35,OZ+20,5,12);
  L(techArr,OX-30,35,OZ+20,OX-30,40,OZ+20);
  for(let s=0;s<6;s++){const a=(s/6)*Math.PI*2; L(techArr,OX-30,35,OZ+20,OX-30+Math.cos(a)*5,35,OZ+20+Math.sin(a)*5);}
  // Data fins
  for(let df=0;df<9;df++){
    const dx=OX-36+df*4, dz=OZ-22;
    for(let l=0;l<5;l++){const y0=l*10,y1=y0+7; const xo=(Math.random()-0.5)*1.2; L(techArr,dx+xo,y0,dz,dx+xo,y1,dz);}
  }
  // Sky bridges
  L(techArr,OX-17,38,OZ-6,OX+3,38,OZ-4); L(techArr,OX-17,40,OZ-6,OX+3,40,OZ-4);
  L(techArr,OX-17,38,OZ-6,OX-17,40,OZ-6); L(techArr,OX+3,38,OZ-4,OX+3,40,OZ-4);
  L(techArr,OX-26,32,OZ+6,OX-17,32,OZ-6);
  // Plaza
  for(let g=0;g<6;g++){L(techArr,OX-36+g*12,0,OZ+32,OX-36+g*12,0,OZ-32); L(techArr,OX-38,0,OZ-32+g*12,OX+38,0,OZ-32+g*12);}
  // Solar panels
  for(let sp=0;sp<6;sp++){
    const spx=OX-36+sp*6,spy=4,spz=OZ+34;
    L(techArr,spx,spy,spz,spx+5,spy,spz);
    L(techArr,spx,spy,spz,spx,spy+0.2,spz+3); L(techArr,spx+5,spy,spz,spx+5,spy+0.2,spz+3);
    L(techArr,spx,spy+0.2,spz+3,spx+5,spy+0.2,spz+3);
  }
}
const techD = makeLines(techArr, 0x88eeff, 0.88);

// ─── CONSTRUCTION SPARK (bright point at drawing front) ─────────────────────
const sparkGeo = new THREE.BufferGeometry();
sparkGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,0,0]),3));
const sparkMat = new THREE.ShaderMaterial({
  uniforms:{ uTime:{value:0} },
  vertexShader:`
    uniform float uTime;
    void main(){
      float pulse=1.0+0.5*sin(uTime*18.0);
      gl_PointSize=12.0*pulse;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
    }`,
  fragmentShader:`
    void main(){
      vec2 uv=gl_PointCoord-0.5; float d=length(uv);
      if(d>0.5)discard;
      float a=(1.0-smoothstep(0.0,0.5,d));
      gl_FragColor=vec4(1.0,1.0,0.85,a*0.9);
    }`,
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
});
const spark = new THREE.Points(sparkGeo, sparkMat);
scene.add(spark);
spark.visible = false;

// Trail of recent spark positions
const TRAIL_LEN = 22;
const trailGeo  = new THREE.BufferGeometry();
const trailPos  = new Float32Array(TRAIL_LEN*3);
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos,3).setUsage(THREE.DynamicDrawUsage));
const trailMat  = new THREE.ShaderMaterial({
  vertexShader:`
    attribute float aIdx;
    varying float vIdx;
    void main(){ vIdx=aIdx; gl_PointSize=4.0*(1.0-aIdx/22.0); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`
    varying float vIdx;
    void main(){
      vec2 uv=gl_PointCoord-0.5; if(length(uv)>0.5)discard;
      gl_FragColor=vec4(1.0,0.95,0.6,(1.0-vIdx/22.0)*0.55);
    }`,
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
});
const trailIdxArr = new Float32Array(TRAIL_LEN);
for(let i=0;i<TRAIL_LEN;i++) trailIdxArr[i]=i;
trailGeo.setAttribute('aIdx', new THREE.BufferAttribute(trailIdxArr,1));
scene.add(new THREE.Points(trailGeo, trailMat));

// ─── ATMOSPHERIC PARTICLES ────────────────────────────────────────────────────
const ATM=1800;
const atmGeo=new THREE.BufferGeometry();
const atmPos2=new Float32Array(ATM*3), atmPh=new Float32Array(ATM), atmHu=new Float32Array(ATM);
for(let i=0;i<ATM;i++){
  atmPos2[i*3]=(Math.random()-.5)*300; atmPos2[i*3+1]=Math.random()*70; atmPos2[i*3+2]=(Math.random()-.5)*300;
  atmPh[i]=Math.random()*Math.PI*2; atmHu[i]=Math.random();
}
atmGeo.setAttribute('position',new THREE.BufferAttribute(atmPos2,3).setUsage(THREE.DynamicDrawUsage));
atmGeo.setAttribute('aPhase',  new THREE.BufferAttribute(atmPh,1));
atmGeo.setAttribute('aHue',    new THREE.BufferAttribute(atmHu,1));
const atmMat=new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:`attribute float aPhase; attribute float aHue; uniform float uTime; varying float vA; varying float vH;
    void main(){ vH=aHue; float hf=1.0-smoothstep(0.0,1.0,position.y/70.0); vA=(0.3+0.4*sin(uTime*0.2+aPhase))*hf; gl_PointSize=1.5+2.0*hf; gl_Position=projectionMatrix*modelViewMatrix*vec4(position+vec3(sin(uTime*0.12+aPhase)*1.2,cos(uTime*0.09+aPhase)*0.5,0.0),1.0); }`,
  fragmentShader:`varying float vA; varying float vH; void main(){ vec2 uv=gl_PointCoord-.5; if(length(uv)>0.5)discard; float a=(1.0-smoothstep(0.1,0.5,length(uv)))*vA*0.65; gl_FragColor=vec4(mix(vec3(0.08,0.70,0.40),vec3(0.04,0.38,0.70),vH),a); }`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
});
scene.add(new THREE.Points(atmGeo,atmMat));

// Blob atmosphere
const BLOBCT=12;
const bGeo=new THREE.BufferGeometry();
const bP=new Float32Array(BLOBCT*3),bPh=new Float32Array(BLOBCT),bHu=new Float32Array(BLOBCT);
for(let i=0;i<BLOBCT;i++){bP[i*3]=(Math.random()-.5)*260;bP[i*3+1]=5+Math.random()*45;bP[i*3+2]=(Math.random()-.5)*260;bPh[i]=Math.random()*Math.PI*2;bHu[i]=Math.random();}
bGeo.setAttribute('position',new THREE.BufferAttribute(bP,3));
bGeo.setAttribute('aPhase',  new THREE.BufferAttribute(bPh,1));
bGeo.setAttribute('aHue',    new THREE.BufferAttribute(bHu,1));
const bMat=new THREE.ShaderMaterial({
  uniforms:{uTime:{value:0}},
  vertexShader:`attribute float aPhase; attribute float aHue; uniform float uTime; varying float vH; void main(){ vH=aHue; gl_PointSize=440.0*(1.0+0.15*sin(uTime*0.22+aPhase)); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`varying float vH; void main(){ float d=length(gl_PointCoord-0.5)*2.0; float a=pow(1.0-smoothstep(0.0,1.0,d),3.2)*0.20; gl_FragColor=vec4(mix(vec3(0.02,0.22,0.18),vec3(0.03,0.30,0.10),vH),a); }`,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
});
scene.add(new THREE.Points(bGeo,bMat));

// ─── SEQUENCE STATE MACHINE ───────────────────────────────────────────────────
const DISTRICTS = [
  { d:farmD,  label:'Agriculture',       colorHex:0xd4e840, dimHex:0x1f2205,
    camPos:new THREE.Vector3(-95,52, 100), camLook:new THREE.Vector3(-65,8,28)  },
  { d:autoD,  label:'Auto Industry',     colorHex:0x20aaff, dimHex:0x020e1a,
    camPos:new THREE.Vector3( 98,50, 100), camLook:new THREE.Vector3(62,8,28)   },
  { d:stadD,  label:'Sports & Recreation',colorHex:0x30ff88, dimHex:0x021908,
    camPos:new THREE.Vector3(-62,60,  18), camLook:new THREE.Vector3(-30,6,-40) },
  { d:techD,  label:'High-Tech District',colorHex:0x88eeff, dimHex:0x051518,
    camPos:new THREE.Vector3( 100,62, 18), camLook:new THREE.Vector3(52,18,-38) },
];

const WIDE_CAM_POS  = new THREE.Vector3(12, 155, 220);
const WIDE_CAM_LOOK = new THREE.Vector3(0, 0, -12);

// Phase structure: each step is a sub-phase with a duration
// Sub-phases: 'overview-start', 'move-i', 'draw-i', 'hold-i', 'overview-end'
const SEQUENCE = [];
SEQUENCE.push({ name:'overview-start',  duration:2.8,  di:-1 });
for(let i=0;i<4;i++){
  SEQUENCE.push({ name:`move`,   duration:2.8,  di:i });
  SEQUENCE.push({ name:`draw`,   duration:6.0,  di:i });
  SEQUENCE.push({ name:`hold`,   duration:2.2,  di:i });
}
SEQUENCE.push({ name:'overview-end',   duration:6.0,  di:-1 });

let seqIdx  = 0;
let seqTime = 0;
const camLookAt = new THREE.Vector3().copy(WIDE_CAM_LOOK);

// HUD refs
const phaseTag    = document.getElementById('phase-tag');
const distLabel   = document.getElementById('district-label');
const drawFill    = document.getElementById('draw-fill');
const dots        = [0,1,2,3].map(i=>document.getElementById(`dot-${i}`));

function setHUD(step){
  const {name,di} = step;
  if(name==='overview-start'||name==='overview-end'){
    phaseTag.textContent  = name==='overview-start' ? 'Initializing Grid' : 'City Overview';
    distLabel.textContent = '——';
    distLabel.classList.remove('show');
    drawFill.style.left='-100%';
  } else {
    const D = DISTRICTS[di];
    phaseTag.textContent  = name==='move' ? 'Moving Camera' : name==='draw' ? 'Constructing' : 'District Complete';
    distLabel.textContent = D.label;
    distLabel.classList.add('show');
    drawFill.style.background = `#${D.colorHex.toString(16).padStart(6,'0')}99`;
    dots.forEach((dot,i)=>{
      dot.classList.remove('active','done');
      if(i<di)      dot.classList.add('done');
      else if(i===di)dot.classList.add('active');
    });
  }
}

function advanceSeq(){
  seqIdx  = (seqIdx+1) % SEQUENCE.length;
  seqTime = 0;
  // If looping back, reset all draw ranges
  if(seqIdx===0){
    DISTRICTS.forEach(({d})=>{
      d.drawnVerts=0;
      d.geo.setDrawRange(0,0);
    });
    groundLines.drawnVerts=0; groundLines.geo.setDrawRange(0,0);
    infraLines.drawnVerts=0;  infraLines.geo.setDrawRange(0,0);
    dots.forEach(d=>{d.classList.remove('active','done');});
    distLabel.classList.remove('show');
  }
  setHUD(SEQUENCE[seqIdx]);
}

// Set initial HUD
setHUD(SEQUENCE[0]);

// Mouse
const mouse={x:0,y:0};
window.addEventListener('mousemove',e=>{mouse.x=(e.clientX/window.innerWidth-.5)*2;mouse.y=(e.clientY/window.innerHeight-.5)*2;});

// ─── Trail state ─────────────────────────────────────────────────────────────
const trailBuffer=[]; for(let i=0;i<TRAIL_LEN;i++) trailBuffer.push(new THREE.Vector3());
let trailHead=0;
function pushTrail(v){
  trailBuffer[trailHead%TRAIL_LEN].copy(v);
  trailHead++;
  for(let i=0;i<TRAIL_LEN;i++){
    const b=trailBuffer[(trailHead-1-i+TRAIL_LEN*10)%TRAIL_LEN];
    trailPos[i*3]=b.x; trailPos[i*3+1]=b.y; trailPos[i*3+2]=b.z;
  }
  trailGeo.attributes.position.needsUpdate=true;
}

// ─── Animate ─────────────────────────────────────────────────────────────────
let t=0, lastTime=performance.now();
const tmpVec=new THREE.Vector3();

function getDrawSpeed(dist){ return dist.totalVerts / 6.0; } // complete in 6s

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now; t+=dt; seqTime+=dt;

  atmMat.uniforms.uTime.value=t;
  bMat.uniforms.uTime.value=t;
  sparkMat.uniforms.uTime.value=t;

  const step=SEQUENCE[seqIdx];

  // ── Camera target ──────────────────────────────────────────────────────────
  let desiredPos, desiredLook;
  if(step.di<0){
    desiredPos  = WIDE_CAM_POS;
    desiredLook = WIDE_CAM_LOOK;
  } else {
    const D=DISTRICTS[step.di];
    const px = D.camPos.clone().add(new THREE.Vector3(mouse.x*5,-mouse.y*3,0));
    desiredPos  = px;
    desiredLook = D.camLook;
  }
  const lf = 1-Math.pow(0.012,dt);
  camera.position.lerp(desiredPos,lf);
  camLookAt.lerp(desiredLook,lf);
  camera.lookAt(camLookAt);

  // ── Ground / infra draw-in during overview-start ───────────────────────────
  if(step.name==='overview-start'||seqIdx>0){
    ['groundLines','infraLines'].forEach(k=>{
      const dl = k==='groundLines'?groundLines:infraLines;
      if(dl.drawnVerts<dl.totalVerts){
        dl.drawnVerts=Math.min(dl.drawnVerts+(dl.totalVerts/2.5)*dt,dl.totalVerts);
        dl.geo.setDrawRange(0,Math.floor(dl.drawnVerts/2)*2);
      }
    });
    // progress bar for grid phase
    if(step.name==='overview-start'){
      const p=Math.min(seqTime/step.duration,1);
      drawFill.style.left=`${p*100-100}%`;
    }
  }

  // ── District opacity management ────────────────────────────────────────────
  DISTRICTS.forEach((D,i)=>{
    const mat=D.d.mat;
    // Fully-drawn districts stay somewhat visible, active is bright
    const isActive = step.di===i;
    const isDrawn  = D.d.drawnVerts>=D.d.totalVerts;
    let targetOp;
    if(isActive)       targetOp=0.9;
    else if(isDrawn)   targetOp=0.22;
    else               targetOp=0.0;
    mat.opacity += (targetOp-mat.opacity)*0.04;
    if(isActive){
      mat.color.lerp(new THREE.Color(D.colorHex),0.06);
    } else if(isDrawn){
      mat.color.lerp(new THREE.Color(D.dimHex),0.04);
    }
  });

  // ── Per-step logic ─────────────────────────────────────────────────────────
  if(step.name==='draw'){
    const D=DISTRICTS[step.di];
    const dl=D.d;
    spark.visible = dl.drawnVerts < dl.totalVerts;

    if(dl.drawnVerts<dl.totalVerts){
      const speed=getDrawSpeed(dl);
      dl.drawnVerts=Math.min(dl.drawnVerts+speed*dt,dl.totalVerts);
      const drawCount=Math.floor(dl.drawnVerts/2)*2;
      dl.geo.setDrawRange(0,drawCount);

      // Spark at current drawing front
      const vi=Math.min(drawCount,dl.totalVerts-2);
      const pos=dl.geo.attributes.position;
      const sx=pos.getX(vi),sy=pos.getY(vi),sz=pos.getZ(vi);
      sparkGeo.attributes.position.setXYZ(0,sx,sy,sz);
      sparkGeo.attributes.position.needsUpdate=true;
      pushTrail(new THREE.Vector3(sx,sy,sz));

      // Progress bar
      const p=dl.drawnVerts/dl.totalVerts;
      drawFill.style.left=`${p*100-100}%`;
    } else {
      spark.visible=false;
      drawFill.style.left='0%';
    }
  }

  if(step.name==='hold'){
    spark.visible=false;
    // Subtle pulse on active district
    const D=DISTRICTS[step.di];
    D.d.mat.opacity=0.75+0.15*Math.sin(t*2.2);
  }

  if(step.name==='overview-end'){
    spark.visible=false;
    // All drawn districts pulse gently in overview
    DISTRICTS.forEach(D=>{
      if(D.d.drawnVerts>0) D.d.mat.opacity=0.28+0.08*Math.sin(t*1.5+D.colorHex*0.0001);
    });
  }

  // ── Advance sequence ───────────────────────────────────────────────────────
  if(seqTime>=step.duration) advanceSeq();

  // ── Atmospheric drift ──────────────────────────────────────────────────────
  const ap=atmGeo.attributes.position;
  for(let i=0;i<ATM;i++){
    const py=ap.getY(i)+0.007;
    ap.setY(i,py>72?Math.random()*4:py);
  }
  ap.needsUpdate=true;

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
