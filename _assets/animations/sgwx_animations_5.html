<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Field</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #010d0b; overflow: hidden; }
  canvas { display: block; }
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, transparent 40%, rgba(1,8,6,0.75) 80%, #010d0b 100%),
      linear-gradient(to bottom, rgba(1,8,6,0.7) 0%, transparent 18%, transparent 75%, rgba(1,8,6,0.85) 100%);
  }
  #grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 6; opacity: 0.06; mix-blend-mode: screen;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
</style>
</head>
<body>
<div id="vignette"></div>
<div id="grain"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x010d0b, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
// Deep exponential fog — far particles vanish into darkness
scene.fog = new THREE.FogExp2(0x010d0b, 0.022);

// ─── Camera ── low angle looking across the wave, like the reference ─────────
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(-10, 28, 90);
camera.lookAt(0, -5, -30);

// ─── Grid config ─────────────────────────────────────────────────────────────
const COLS     = 110;
const ROWS     = 80;
const SPACING  = 1.8;
const W        = COLS * SPACING;
const D        = ROWS * SPACING;
const COUNT    = COLS * ROWS;

// ─── Wave helpers (layered sinusoids — no external noise lib needed) ──────────
function waveHeight(x, z, t) {
  const nx = x / W;
  const nz = z / D;

  // Primary rolling swell
  const w1 = Math.sin(nx * 6.0 + nz * 3.5 - t * 1.1) * 7.0;
  // Secondary cross-ripple
  const w2 = Math.sin(nx * 12.0 - nz * 5.0 + t * 0.7) * 3.2;
  // Subtle high-freq texture
  const w3 = Math.sin(nx * 22.0 + nz * 18.0 - t * 1.8) * 1.1;
  // Long diagonal drift
  const w4 = Math.sin((nx + nz) * 4.5 + t * 0.4) * 4.5;

  return w1 + w2 + w3 + w4;
}

// ─── Geometry ─────────────────────────────────────────────────────────────────
const geo      = new THREE.BufferGeometry();
const positions= new Float32Array(COUNT * 3);
const heights  = new Float32Array(COUNT);   // normalized 0-1 brightness attribute
const colAttr  = new Float32Array(COUNT);   // 0 = teal, 1 = gold

// Build initial grid positions (xz) — y will be animated
let idx = 0;
for (let row = 0; row < ROWS; row++) {
  for (let col = 0; col < COLS; col++) {
    const x = (col / (COLS - 1) - 0.5) * W;
    const z = (row / (ROWS - 1) - 0.5) * D - 20; // offset back so surface fills view
    positions[idx * 3]     = x;
    positions[idx * 3 + 1] = 0;
    positions[idx * 3 + 2] = z;

    // Sprinkle a few gold nodes — more likely near center column
    const centerBias = 1 - Math.abs(col / COLS - 0.5) * 2;
    colAttr[idx] = Math.random() < 0.055 * (0.3 + centerBias) ? 1 : 0;

    idx++;
  }
}

geo.setAttribute('position', new THREE.BufferAttribute(positions, 3).setUsage(THREE.DynamicDrawUsage));
geo.setAttribute('aHeight',  new THREE.BufferAttribute(heights,   1).setUsage(THREE.DynamicDrawUsage));
geo.setAttribute('aGold',    new THREE.BufferAttribute(colAttr,   1));

// ─── Particle shader ─────────────────────────────────────────────────────────
const mat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float aHeight;  // 0-1 normalized wave height
    attribute float aGold;
    varying float vH;
    varying float vGold;
    void main() {
      vH    = aHeight;
      vGold = aGold;

      // Base size driven by wave height — crests are bigger/brighter
      float sz = mix(1.2, 6.5, aHeight) * mix(1.0, 2.2, aGold);
      gl_PointSize = sz;
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vH;
    varying float vGold;
    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv);
      if (d > 0.5) discard;

      // Soft disc with bright core
      float core = 1.0 - smoothstep(0.0, 0.2, d);
      float halo = 1.0 - smoothstep(0.1, 0.5, d);
      float brightness = core * 0.95 + halo * 0.4;

      // Color ramp: dark teal at troughs → bright cyan-white at crests
      vec3 trough = vec3(0.02, 0.22, 0.18);
      vec3 mid    = vec3(0.05, 0.55, 0.45);
      vec3 crest  = vec3(0.72, 0.97, 0.90);
      vec3 gold   = vec3(0.95, 0.85, 0.18);

      vec3 waveCol = mix(trough, mix(mid, crest, smoothstep(0.4, 1.0, vH)), vH);
      vec3 col = mix(waveCol, gold, vGold * smoothstep(0.3, 0.8, vH));

      float alpha = brightness * mix(0.35, 1.0, vH) * mix(1.0, 1.4, vGold);
      alpha = clamp(alpha, 0.0, 1.0);
      gl_FragColor = vec4(col, alpha);
    }
  `,
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
});

const points = new THREE.Points(geo, mat);
scene.add(points);

// ─── Second sparse layer — large soft glows at crests for bloom feel ──────────
// We'll do this in JS by spawning a secondary Points with bigger sizes
const SPARSE     = Math.floor(COUNT / 18);
const sparseGeo  = new THREE.BufferGeometry();
const sPos       = new Float32Array(SPARSE * 3);
const sH         = new Float32Array(SPARSE);
sparseGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3).setUsage(THREE.DynamicDrawUsage));
sparseGeo.setAttribute('aHeight',  new THREE.BufferAttribute(sH,   1).setUsage(THREE.DynamicDrawUsage));

const sparseMat = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: `
    attribute float aHeight;
    varying float vH;
    void main() {
      vH = aHeight;
      gl_PointSize = mix(0.0, 28.0, pow(aHeight, 2.5));
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vH;
    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv) * 2.0;
      float a  = pow(1.0 - smoothstep(0.0, 1.0, d), 2.5) * vH * 0.22;
      vec3 col = mix(vec3(0.05, 0.6, 0.5), vec3(0.8, 1.0, 0.95), vH);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Points(sparseGeo, sparseMat));

// Pre-select sparse indices
const sparseIdx = [];
for (let i = 0; i < SPARSE; i++) {
  sparseIdx.push(Math.floor(Math.random() * COUNT));
}

// ─── Mouse ───────────────────────────────────────────────────────────────────
const mouse = { x: 0, y: 0 };
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth  - 0.5) * 2;
  mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ─── Animate ─────────────────────────────────────────────────────────────────
let t = 0;

// Pre-compute base xz for each vertex (don't recompute every frame)
const baseX = new Float32Array(COUNT);
const baseZ = new Float32Array(COUNT);
for (let i = 0; i < COUNT; i++) {
  baseX[i] = positions[i * 3];
  baseZ[i] = positions[i * 3 + 2];
}

// Height range for normalization
const HMIN = -7.0 - 3.2 - 1.1 - 4.5;
const HMAX =  7.0 + 3.2 + 1.1 + 4.5;

function animate() {
  requestAnimationFrame(animate);
  t += 0.006;

  mat.uniforms.uTime.value = t;

  const pos = geo.attributes.position;
  const hAttr = geo.attributes.aHeight;

  for (let i = 0; i < COUNT; i++) {
    const x = baseX[i];
    const z = baseZ[i];
    const h = waveHeight(x, z, t);
    const hn = (h - HMIN) / (HMAX - HMIN); // 0-1

    pos.setY(i, h);
    hAttr.setX(i, hn);
  }
  pos.needsUpdate   = true;
  hAttr.needsUpdate = true;

  // Update sparse bloom layer
  const sp  = sparseGeo.attributes.position;
  const shA = sparseGeo.attributes.aHeight;
  for (let s = 0; s < SPARSE; s++) {
    const i = sparseIdx[s];
    sp.setXYZ(s, baseX[i], geo.attributes.position.getY(i) + 0.5, baseZ[i]);
    shA.setX(s, hAttr.getX(i));
  }
  sp.needsUpdate  = true;
  shA.needsUpdate = true;

  // Gentle camera drift — slow breathe forward/back + mouse tilt
  const camX = -10 + mouse.x * 6 + Math.sin(t * 0.12) * 5;
  const camY = 28  - mouse.y * 4 + Math.sin(t * 0.07) * 2;
  const camZ = 90  + Math.cos(t * 0.09) * 8;

  camera.position.x += (camX - camera.position.x) * 0.03;
  camera.position.y += (camY - camera.position.y) * 0.03;
  camera.position.z += (camZ - camera.position.z) * 0.03;
  camera.lookAt(mouse.x * 3, -6 + mouse.y * 2, -30);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
