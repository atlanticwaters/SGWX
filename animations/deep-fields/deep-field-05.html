<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Field 05 — Dense Interference</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#010f0b; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; }
  #grain {
    position:fixed; inset:0; pointer-events:none; z-index:2;
    opacity:0.058; mix-blend-mode:screen;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:220px 220px;
  }
  #vignette {
    position:fixed; inset:0; pointer-events:none; z-index:3;
    background:radial-gradient(ellipse 90% 82% at 50% 50%, transparent 32%, rgba(1,12,8,0.58) 66%, #010f0b 100%);
  }
  #label {
    position:fixed; bottom:36px; left:40px; z-index:10;
    font-family:'Courier New',monospace; font-size:7px;
    letter-spacing:0.5em; text-transform:uppercase;
    color:rgba(120,190,150,0.3);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="grain"></div>
<div id="vignette"></div>
<div id="label">Deep Field 05 — Dense Interference</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// Dense grid of small pools — overlapping screen blending creates complex
// moire-like interference between teal, blue, green rings. 22 pools total.
const pools = [
  // 6 base tones — medium, varied speeds
  { x:0.12, y:0.20, r:0.28, col:[8,55,38],    spd:0.00042, ph:0.0 },
  { x:0.38, y:0.14, r:0.26, col:[5,30,55],    spd:0.00038, ph:1.1 },
  { x:0.65, y:0.22, r:0.30, col:[10,62,42],   spd:0.00045, ph:2.4 },
  { x:0.88, y:0.35, r:0.25, col:[4,25,48],    spd:0.00035, ph:3.8 },
  { x:0.08, y:0.50, r:0.28, col:[9,52,35],    spd:0.00040, ph:5.0 },
  { x:0.92, y:0.55, r:0.24, col:[6,35,52],    spd:0.00036, ph:0.6 },
  // 6 mid-layer
  { x:0.22, y:0.42, r:0.26, col:[12,68,45],   spd:0.00055, ph:1.8 },
  { x:0.50, y:0.38, r:0.28, col:[5,28,52],    spd:0.00048, ph:3.2 },
  { x:0.75, y:0.45, r:0.25, col:[10,58,40],   spd:0.00060, ph:4.6 },
  { x:0.32, y:0.65, r:0.27, col:[7,40,55],    spd:0.00052, ph:0.3 },
  { x:0.58, y:0.70, r:0.26, col:[11,60,38],   spd:0.00044, ph:2.0 },
  { x:0.82, y:0.72, r:0.24, col:[4,22,42],    spd:0.00057, ph:5.8 },
  // 4 accent yellow-green
  { x:0.44, y:0.28, r:0.16, col:[65,90,12],   spd:0.00075, ph:1.5 },
  { x:0.18, y:0.75, r:0.14, col:[75,102,10],  spd:0.00082, ph:4.2 },
  { x:0.70, y:0.28, r:0.15, col:[58,82,8],    spd:0.00068, ph:2.8 },
  { x:0.88, y:0.82, r:0.13, col:[85,115,14],  spd:0.00088, ph:0.9 },
  // 3 cyan flecks
  { x:0.28, y:0.52, r:0.12, col:[10,80,95],   spd:0.00095, ph:3.5 },
  { x:0.60, y:0.50, r:0.11, col:[8,72,85],    spd:0.00102, ph:1.2 },
  { x:0.45, y:0.85, r:0.10, col:[12,90,105],  spd:0.00088, ph:5.5 },
  // 3 tiny hot sparks — pure interference artifacts
  { x:0.35, y:0.35, r:0.07, col:[120,145,18], spd:0.00120, ph:2.1 },
  { x:0.68, y:0.60, r:0.06, col:[100,128,14], spd:0.00130, ph:4.7 },
  { x:0.14, y:0.88, r:0.06, col:[140,160,20], spd:0.00115, ph:0.2 },
];

// Each pool has independent amplitude
const amps = pools.map((_, i) => 0.055 + (i % 7) * 0.018);

let frame = 0;
function draw() {
  frame++;
  const W = canvas.width, H = canvas.height;
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = '#010f0b';
  ctx.fillRect(0, 0, W, H);

  pools.forEach((p, i) => {
    const t   = frame * p.spd;
    const amp = amps[i];
    const bx  = p.x + Math.sin(t + p.ph) * amp;
    const by  = p.y + Math.cos(t + p.ph * 1.35) * amp * 0.68;
    const br  = p.r * (1 + Math.sin(t * 1.6 + p.ph) * 0.055);
    const cx2 = bx * W, cy2 = by * H;
    const rad  = br * Math.max(W, H);
    const [r,g,b] = p.col;

    // Tighter falloff than other versions — pools don't spread as far,
    // creating crisper edges and more visible interference bands
    const grad = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, rad);
    grad.addColorStop(0,   `rgba(${r},${g},${b},0.80)`);
    grad.addColorStop(0.28,`rgba(${r},${g},${b},0.35)`);
    grad.addColorStop(0.55,`rgba(${r},${g},${b},0.10)`);
    grad.addColorStop(0.80,`rgba(${r},${g},${b},0.02)`);
    grad.addColorStop(1,   `rgba(${r},${g},${b},0.00)`);
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  });

  ctx.globalCompositeOperation = 'multiply';
  const depth = ctx.createRadialGradient(W*0.5,H*0.5,0, W*0.5,H*0.5,W*0.68);
  depth.addColorStop(0,   'rgba(18,42,28,0.0)');
  depth.addColorStop(0.48,'rgba(4,15,10,0.35)');
  depth.addColorStop(1,   'rgba(1,8,5,0.90)');
  ctx.fillStyle = depth;
  ctx.fillRect(0, 0, W, H);

  const atm = ctx.createLinearGradient(0, 0, 0, H);
  atm.addColorStop(0,    'rgba(1,8,5,0.55)');
  atm.addColorStop(0.12, 'rgba(1,8,5,0.0)');
  atm.addColorStop(0.88, 'rgba(1,8,5,0.0)');
  atm.addColorStop(1,    'rgba(1,8,5,0.62)');
  ctx.fillStyle = atm;
  ctx.fillRect(0, 0, W, H);

  ctx.globalCompositeOperation = 'source-over';
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
