<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Field 04 — Sparse Void</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#010c09; overflow:hidden; }
  canvas { position:fixed; inset:0; display:block; width:100vw; height:100vh; }
  #c1 { z-index:0; }
  #c2 { z-index:1; }
  #grain {
    position:fixed; inset:0; pointer-events:none; z-index:4;
    opacity:0.050; mix-blend-mode:screen;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:220px 220px;
  }
  #vignette {
    position:fixed; inset:0; pointer-events:none; z-index:5;
    background:
      radial-gradient(ellipse 82% 72% at 50% 50%, transparent 20%, rgba(1,10,7,0.42) 56%, #010c09 100%),
      linear-gradient(to bottom, rgba(1,10,7,0.58) 0%, transparent 14%, transparent 86%, rgba(1,10,7,0.62) 100%);
  }

</style>
</head>
<body>
<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<div id="grain"></div>
<div id="vignette"></div>

<script>
'use strict';

const c1 = document.getElementById('c1');
const c2 = document.getElementById('c2');
const x1 = c1.getContext('2d');
const x2 = c2.getContext('2d');

function resize() {
  [c1, c2].forEach(c => {
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
  });
  buildStars();
}

// ─── Mouse parallax ───────────────────────────────────────────────────────────
const mouse = { x:0.5, y:0.5, tx:0.5, ty:0.5 };
window.addEventListener('mousemove', e => {
  mouse.tx = e.clientX / window.innerWidth;
  mouse.ty = e.clientY / window.innerHeight;
});

// ─── STAR FIELD (c1) — simple twinkle, no spikes ─────────────────────────────
const STAR_COUNT = 480;
let stars = [];

function buildStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    const b = Math.random();
    stars.push({
      x:    Math.random(), y:    Math.random(),
      r:    0.25 + b * 1.0,
      op:   0.07 + b * 0.46,
      depth: Math.random(),
      tph:  Math.random() * Math.PI * 2,
      tspd: 0.0005 + Math.random() * 0.0014,
      hue:  Math.random(), // 0=cool, 1=warm
    });
  }
}
buildStars();

function drawStars(frame) {
  const W = c1.width, H = c1.height;
  x1.clearRect(0, 0, W, H);
  const px = (mouse.x - 0.5) * 22;
  const py = (mouse.y - 0.5) * 13;

  stars.forEach(s => {
    const tw = 0.5 + 0.5 * Math.sin(frame * s.tspd + s.tph);
    const al = s.op * (0.5 + 0.5 * tw);
    const sx = s.x * W + px * s.depth;
    const sy = s.y * H + py * s.depth;
    // Color tinted by which color zone the star sits in
    const r = Math.floor(140 + s.hue * 80);
    const g = Math.floor(205 + s.depth * 30);
    const b = Math.floor(175 + (1 - s.hue) * 55);

    // Soft halo — no spikes
    if (s.op > 0.28) {
      const halo = x1.createRadialGradient(sx, sy, 0, sx, sy, s.r * 5.5);
      halo.addColorStop(0, `rgba(${r},${g},${b},${(al * 0.38).toFixed(3)})`);
      halo.addColorStop(1, `rgba(${r},${g},${b},0)`);
      x1.globalCompositeOperation = 'screen';
      x1.fillStyle = halo;
      x1.beginPath(); x1.arc(sx, sy, s.r * 5.5, 0, Math.PI * 2); x1.fill();
    }
    x1.globalCompositeOperation = 'screen';
    x1.globalAlpha = al;
    x1.fillStyle = `rgb(${r},${g},${b})`;
    x1.beginPath(); x1.arc(sx, sy, s.r, 0, Math.PI * 2); x1.fill();
    x1.globalAlpha = 1;
  });
  x1.globalCompositeOperation = 'source-over';
}

// ─── COLOR FIELD SYSTEM ───────────────────────────────────────────────────────
// Three layers of pools, all drawn on c2:
//
//   LAYER A — Giant tectonic slabs (4 pools, screen-filling, very slow)
//             These define the dominant color climate across the canvas
//
//   LAYER B — Mid pools (9 pools, large, medium speed)
//             More saturated, each with a distinct hue identity
//             Move enough to be perceptibly alive
//
//   LAYER C — Accent fields (8 pools, medium-small, faster)
//             Vivid: gold, amber, lime, sapphire, rose-teal, copper
//             These are what your eye actually lands on
//             Opacity cycles wide — some are nearly absent then surge back
//
// All pools use slow, independent opacity sinusoids so the composition
// shifts over a 2-4 minute horizon — different every time you look.

// Pool definition: x, y, r, col, spd, ph, amp, pulse, oc, parallax
// oc = opacity cycle: spd, ph, min, max
// amp = position drift amount
// pulse = radius breath speed

const layerA = [
  // Deep teal-green mass — anchors top-left
  { x:0.08, y:0.22, r:1.05, col:[5,45,32],   spd:0.000068, ph:0.0,  amp:0.018, pulse:0.000050, oc:{spd:0.000045,ph:0.0, min:0.30,max:0.72}, pl:0.02 },
  // Deep blue-navy mass — right side
  { x:0.90, y:0.55, r:0.98, col:[2,20,50],   spd:0.000055, ph:2.5,  amp:0.015, pulse:0.000042, oc:{spd:0.000038,ph:1.8, min:0.22,max:0.65}, pl:0.02 },
  // Dark forest green — bottom
  { x:0.45, y:0.92, r:0.95, col:[4,38,20],   spd:0.000062, ph:5.0,  amp:0.016, pulse:0.000046, oc:{spd:0.000042,ph:3.4, min:0.28,max:0.70}, pl:0.02 },
  // Midnight blue-green — upper right
  { x:0.78, y:0.12, r:0.90, col:[3,25,42],   spd:0.000058, ph:3.8,  amp:0.014, pulse:0.000044, oc:{spd:0.000040,ph:5.2, min:0.25,max:0.68}, pl:0.02 },
];

const layerB = [
  // Vivid teal — center-left
  { x:0.22, y:0.42, r:0.52, col:[8,72,52],   spd:0.000135, ph:0.6,  amp:0.042, pulse:0.000108, oc:{spd:0.000090,ph:0.4, min:0.42,max:0.88}, pl:0.07 },
  // Rich blue — upper center
  { x:0.55, y:0.18, r:0.48, col:[4,32,68],   spd:0.000118, ph:2.0,  amp:0.038, pulse:0.000095, oc:{spd:0.000080,ph:2.2, min:0.38,max:0.85}, pl:0.08 },
  // Deep emerald — lower left
  { x:0.12, y:0.72, r:0.50, col:[6,58,36],   spd:0.000145, ph:4.2,  amp:0.044, pulse:0.000115, oc:{spd:0.000095,ph:1.0, min:0.40,max:0.86}, pl:0.06 },
  // Sapphire — right mid
  { x:0.78, y:0.40, r:0.44, col:[3,28,62],   spd:0.000125, ph:1.4,  amp:0.040, pulse:0.000100, oc:{spd:0.000085,ph:3.6, min:0.35,max:0.82}, pl:0.07 },
  // Jade — lower center
  { x:0.48, y:0.78, r:0.46, col:[7,55,38],   spd:0.000140, ph:5.8,  amp:0.042, pulse:0.000112, oc:{spd:0.000092,ph:4.8, min:0.38,max:0.84}, pl:0.07 },
  // Steel blue — upper right
  { x:0.82, y:0.18, r:0.40, col:[5,38,58],   spd:0.000130, ph:3.2,  amp:0.038, pulse:0.000105, oc:{spd:0.000088,ph:0.9, min:0.32,max:0.80}, pl:0.08 },
  // Dark cyan — center
  { x:0.40, y:0.50, r:0.42, col:[6,52,48],   spd:0.000150, ph:0.2,  amp:0.045, pulse:0.000120, oc:{spd:0.000098,ph:2.6, min:0.35,max:0.82}, pl:0.09 },
  // Pine — bottom right
  { x:0.75, y:0.80, r:0.44, col:[5,42,28],   spd:0.000122, ph:4.5,  amp:0.038, pulse:0.000098, oc:{spd:0.000082,ph:1.5, min:0.32,max:0.78}, pl:0.06 },
  // Ultramarine — left
  { x:0.05, y:0.38, r:0.38, col:[2,18,55],   spd:0.000142, ph:2.8,  amp:0.042, pulse:0.000115, oc:{spd:0.000094,ph:5.0, min:0.30,max:0.76}, pl:0.07 },
];

const layerC = [
  // Gold — drifts mid-canvas
  { x:0.58, y:0.38, r:0.24, col:[88,105,8],  spd:0.000265, ph:1.2,  amp:0.082, pulse:0.000220, oc:{spd:0.000175,ph:0.8, min:0.05,max:0.92}, pl:0.16 },
  // Amber — warm, lower center
  { x:0.42, y:0.62, r:0.22, col:[105,72,10], spd:0.000290, ph:3.8,  amp:0.088, pulse:0.000240, oc:{spd:0.000190,ph:3.2, min:0.00,max:0.88}, pl:0.18 },
  // Lime — upper left
  { x:0.18, y:0.28, r:0.20, col:[52,92,8],   spd:0.000310, ph:0.4,  amp:0.092, pulse:0.000255, oc:{spd:0.000205,ph:1.5, min:0.02,max:0.85}, pl:0.20 },
  // Copper — right edge, tall
  { x:0.88, y:0.65, r:0.18, col:[95,55,12],  spd:0.000325, ph:5.5,  amp:0.095, pulse:0.000268, oc:{spd:0.000215,ph:4.0, min:0.00,max:0.80}, pl:0.19 },
  // Cyan — far upper right
  { x:0.92, y:0.08, r:0.18, col:[8,88,105],  spd:0.000285, ph:2.4,  amp:0.085, pulse:0.000235, oc:{spd:0.000188,ph:2.8, min:0.05,max:0.82}, pl:0.17 },
  // Yellow-green — lower right
  { x:0.68, y:0.85, r:0.16, col:[75,110,10], spd:0.000340, ph:4.2,  amp:0.098, pulse:0.000280, oc:{spd:0.000225,ph:0.2, min:0.00,max:0.78}, pl:0.21 },
  // Rose-teal — center left
  { x:0.28, y:0.55, r:0.15, col:[10,82,62],  spd:0.000358, ph:1.6,  amp:0.100, pulse:0.000295, oc:{spd:0.000238,ph:5.5, min:0.05,max:0.88}, pl:0.22 },
  // Warm olive — upper mid
  { x:0.50, y:0.30, r:0.14, col:[68,78,8],   spd:0.000372, ph:3.0,  amp:0.102, pulse:0.000308, oc:{spd:0.000248,ph:2.0, min:0.00,max:0.75}, pl:0.23 },
];

// Elliptical banded zones — drawn with canvas transform squash
// These are broad color temperature regions that define the "climate"
// of different screen areas. Very slow, very large, very subtle.
const bands = [
  // Warm zone — lower-center, tilted right
  { cx:0.55, cy:0.70, rx:0.72, ry:0.18, ang:0.22,  col:[52,48,6],  spd:0.000038, ph:0.0, amp:0.012, oc:{spd:0.000032,ph:0.0,min:0.18,max:0.52}, pl:0.03 },
  // Cool zone — upper-left to lower-right
  { cx:0.30, cy:0.30, rx:0.68, ry:0.14, ang:-0.18, col:[4,30,52],  spd:0.000032, ph:2.2, amp:0.010, oc:{spd:0.000028,ph:1.5,min:0.15,max:0.48}, pl:0.03 },
  // Green zone — horizontal mid-band
  { cx:0.50, cy:0.55, rx:0.80, ry:0.12, ang:0.05,  col:[5,40,25],  spd:0.000035, ph:4.5, amp:0.011, oc:{spd:0.000030,ph:3.2,min:0.12,max:0.44}, pl:0.02 },
  // Gold temperature band — diagonal
  { cx:0.65, cy:0.40, rx:0.55, ry:0.10, ang:0.38,  col:[48,40,5],  spd:0.000040, ph:1.8, amp:0.013, oc:{spd:0.000035,ph:0.5,min:0.10,max:0.40}, pl:0.04 },
];

function drawElliptical(ctx, item, frame, px, py, W, H) {
  const t   = frame * item.spd;
  const oc  = item.oc;
  const opB = oc.min + (oc.max - oc.min) * (0.5 + 0.5 * Math.sin(frame * oc.spd + oc.ph));

  const bx = (item.cx + Math.sin(t + item.ph) * item.amp + (px * item.pl) / W) * W;
  const by = (item.cy + Math.cos(t + item.ph * 1.3) * item.amp * 0.6 + (py * item.pl) / H) * H;

  const scaleX = item.rx * Math.max(W, H);
  const scaleY = item.ry * Math.max(W, H);
  const [r,g,b] = item.col;

  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(item.ang);
  ctx.scale(1, scaleY / scaleX);

  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, scaleX);
  grad.addColorStop(0,    `rgba(${r},${g},${b},${(opB * 0.60).toFixed(3)})`);
  grad.addColorStop(0.30, `rgba(${r},${g},${b},${(opB * 0.30).toFixed(3)})`);
  grad.addColorStop(0.60, `rgba(${r},${g},${b},${(opB * 0.08).toFixed(3)})`);
  grad.addColorStop(1,    `rgba(${r},${g},${b},0.000)`);

  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = grad;
  ctx.fillRect(-scaleX, -scaleX, scaleX * 2, scaleX * 2);
  ctx.restore();
}

function drawPool(ctx, p, frame, px, py, W, H) {
  const t   = frame * p.spd;
  const tp  = frame * p.pulse;
  const oc  = p.oc;
  const opB = oc.min + (oc.max - oc.min) * (0.5 + 0.5 * Math.sin(frame * oc.spd + oc.ph));

  const bx = p.x + Math.sin(t + p.ph) * p.amp + (px * p.pl) / W;
  const by = p.y + Math.cos(t + p.ph * 1.22) * p.amp * 0.68 + (py * p.pl) / H;
  const br = p.r * (1 + Math.sin(tp + p.ph * 0.82) * 0.055);

  const cxv = bx * W, cyv = by * H;
  const rad  = br * Math.max(W, H);
  const [r,g,b] = p.col;

  const grad = ctx.createRadialGradient(cxv, cyv, 0, cxv, cyv, rad);
  grad.addColorStop(0,    `rgba(${r},${g},${b},${(opB * 0.88).toFixed(3)})`);
  grad.addColorStop(0.18, `rgba(${r},${g},${b},${(opB * 0.52).toFixed(3)})`);
  grad.addColorStop(0.42, `rgba(${r},${g},${b},${(opB * 0.18).toFixed(3)})`);
  grad.addColorStop(0.68, `rgba(${r},${g},${b},${(opB * 0.04).toFixed(3)})`);
  grad.addColorStop(1,    `rgba(${r},${g},${b},0.000)`);

  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ─── Main loop ────────────────────────────────────────────────────────────────
let frame = 0;

function draw() {
  frame++;

  mouse.x += (mouse.tx - mouse.x) * 0.032;
  mouse.y += (mouse.ty - mouse.y) * 0.032;

  const W = c2.width, H = c2.height;
  const px = (mouse.x - 0.5) * 32;
  const py = (mouse.y - 0.5) * 18;

  // c1 — stars
  drawStars(frame);

  // c2 — all color fields
  x2.clearRect(0, 0, W, H);

  // Layer 0: elliptical temperature bands (deepest, subtlest)
  bands.forEach(b => drawElliptical(x2, b, frame, px, py, W, H));

  // Layer A: giant tectonic slabs
  layerA.forEach(p => drawPool(x2, p, frame, px, py, W, H));

  // Layer B: mid pools — main visible color mass
  layerB.forEach(p => drawPool(x2, p, frame, px, py, W, H));

  // Layer C: accent fields — warm hues, vivid, slow fade in/out
  layerC.forEach(p => drawPool(x2, p, frame, px, py, W, H));

  // Depth multiply — push the void into the edges
  x2.globalCompositeOperation = 'multiply';

  const depth = x2.createRadialGradient(W*0.5,H*0.5, 0, W*0.5,H*0.5, W*0.85);
  depth.addColorStop(0,    'rgba(16,42,28,0.00)');
  depth.addColorStop(0.22, 'rgba(5,18,11,0.15)');
  depth.addColorStop(0.50, 'rgba(2,9,6,0.44)');
  depth.addColorStop(0.76, 'rgba(1,5,3,0.70)');
  depth.addColorStop(1,    'rgba(1,4,2,0.95)');
  x2.fillStyle = depth;
  x2.fillRect(0, 0, W, H);

  const atm = x2.createLinearGradient(0, 0, 0, H);
  atm.addColorStop(0,    'rgba(1,5,3,0.68)');
  atm.addColorStop(0.11, 'rgba(1,5,3,0.00)');
  atm.addColorStop(0.89, 'rgba(1,5,3,0.00)');
  atm.addColorStop(1,    'rgba(1,5,3,0.72)');
  x2.fillStyle = atm;
  x2.fillRect(0, 0, W, H);

  // Asymmetric diagonal — bottom-left heavy
  const diag = x2.createLinearGradient(0, H, W, 0);
  diag.addColorStop(0,    'rgba(1,5,3,0.42)');
  diag.addColorStop(0.35, 'rgba(1,5,3,0.00)');
  diag.addColorStop(0.65, 'rgba(1,5,3,0.00)');
  diag.addColorStop(1,    'rgba(1,5,3,0.30)');
  x2.fillStyle = diag;
  x2.fillRect(0, 0, W, H);

  x2.globalCompositeOperation = 'source-over';
  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
