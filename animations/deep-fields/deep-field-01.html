<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Field 01 — Bioluminescent Tide</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #010e0a;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      opacity: 0.055;
      mix-blend-mode: screen;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.78' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 220px 220px;
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: radial-gradient(ellipse 85% 75% at 50% 50%, transparent 28%, rgba(1, 14, 10, 0.65) 68%, #010e0a 100%);
    }

    #label {
      position: fixed;
      bottom: 36px;
      left: 40px;
      z-index: 10;
      font-family: 'Courier New', monospace;
      font-size: 7px;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: rgba(140, 200, 165, 0.3);
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>
  <div id="grain"></div>
  <div id="vignette"></div>
  <div id="label"></div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Warm teal + gold bioluminescent pools — feels like deep-ocean glowing organisms
    const pools = [
      // Large slow foundation pools
      { x: 0.15, y: 0.40, r: 0.52, col: [8, 62, 44], spd: 0.00022, ph: 0.0, amp: 0.065, pulse: 0.00018 },
      { x: 0.78, y: 0.55, r: 0.48, col: [5, 38, 60], spd: 0.00018, ph: 1.8, amp: 0.055, pulse: 0.00014 },
      { x: 0.50, y: 0.20, r: 0.44, col: [10, 70, 48], spd: 0.00028, ph: 3.2, amp: 0.070, pulse: 0.00022 },
      { x: 0.30, y: 0.78, r: 0.46, col: [4, 30, 55], spd: 0.00016, ph: 5.0, amp: 0.050, pulse: 0.00016 },
      { x: 0.85, y: 0.22, r: 0.38, col: [12, 50, 32], spd: 0.00032, ph: 0.9, amp: 0.080, pulse: 0.00026 },
      { x: 0.60, y: 0.80, r: 0.40, col: [6, 44, 62], spd: 0.00020, ph: 4.4, amp: 0.060, pulse: 0.00018 },
      // Mid pools — more active
      { x: 0.08, y: 0.62, r: 0.34, col: [14, 58, 28], spd: 0.00038, ph: 2.5, amp: 0.090, pulse: 0.00032 },
      { x: 0.94, y: 0.68, r: 0.30, col: [3, 22, 42], spd: 0.00024, ph: 1.2, amp: 0.045, pulse: 0.00020 },
      { x: 0.42, y: 0.50, r: 0.36, col: [9, 55, 38], spd: 0.00030, ph: 6.0, amp: 0.075, pulse: 0.00024 },
      // Gold / yellow-green accents — small, bright, faster
      { x: 0.55, y: 0.38, r: 0.16, col: [70, 92, 10], spd: 0.00055, ph: 2.2, amp: 0.120, pulse: 0.00048 },
      { x: 0.22, y: 0.18, r: 0.12, col: [85, 108, 8], spd: 0.00065, ph: 4.8, amp: 0.140, pulse: 0.00058 },
      { x: 0.80, y: 0.44, r: 0.14, col: [55, 80, 12], spd: 0.00048, ph: 1.5, amp: 0.110, pulse: 0.00040 },
      { x: 0.38, y: 0.88, r: 0.10, col: [100, 115, 14], spd: 0.00070, ph: 3.8, amp: 0.160, pulse: 0.00062 },
      // Tiny ember sparks
      { x: 0.68, y: 0.28, r: 0.08, col: [120, 130, 18], spd: 0.00080, ph: 0.5, amp: 0.180, pulse: 0.00072 },
      { x: 0.12, y: 0.85, r: 0.07, col: [90, 110, 12], spd: 0.00075, ph: 5.5, amp: 0.170, pulse: 0.00068 },
    ];

    let frame = 0;

    function draw() {
      frame++;
      const W = canvas.width, H = canvas.height;

      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#010e0a';
      ctx.fillRect(0, 0, W, H);

      pools.forEach(p => {
        const t = frame * p.spd;
        const tp = frame * p.pulse;
        const bx = p.x + Math.sin(t + p.ph) * p.amp;
        const by = p.y + Math.cos(t + p.ph * 1.4) * p.amp * 0.65;
        // Radius breathes on its own slower cycle
        const br = p.r * (1 + Math.sin(tp + p.ph * 0.7) * 0.06);
        const cx = bx * W, cy = by * H;
        const rad = br * Math.max(W, H);
        const [r, g, b] = p.col;

        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
        grad.addColorStop(0, `rgba(${r},${g},${b},0.75)`);
        grad.addColorStop(0.35, `rgba(${r},${g},${b},0.30)`);
        grad.addColorStop(0.65, `rgba(${r},${g},${b},0.08)`);
        grad.addColorStop(1, `rgba(${r},${g},${b},0.00)`);

        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      });

      // Depth crush — multiply vignette to push edges deep
      ctx.globalCompositeOperation = 'multiply';
      const depth = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, W * 0.72);
      depth.addColorStop(0, 'rgba(22,52,36,0.0)');
      depth.addColorStop(0.55, 'rgba(4,16,10,0.35)');
      depth.addColorStop(1, 'rgba(1,8,5,0.90)');
      ctx.fillStyle = depth;
      ctx.fillRect(0, 0, W, H);

      // Horizontal atmospheric band — denser near base
      const atm = ctx.createLinearGradient(0, 0, 0, H);
      atm.addColorStop(0, 'rgba(1,8,5,0.55)');
      atm.addColorStop(0.12, 'rgba(2,12,8,0.0)');
      atm.addColorStop(0.88, 'rgba(2,12,8,0.0)');
      atm.addColorStop(1, 'rgba(1,8,5,0.65)');
      ctx.fillStyle = atm;
      ctx.fillRect(0, 0, W, H);

      ctx.globalCompositeOperation = 'source-over';
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>

</html>
