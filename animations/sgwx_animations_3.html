<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organic Network</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #030d0a; overflow: hidden; width: 100vw; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Scene Setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 80;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x030d0a, 1);
document.body.appendChild(renderer.domElement);

// Color palette
const COLORS = {
  deepBlue:   new THREE.Color(0x042a3d),
  midBlue:    new THREE.Color(0x0a4f5e),
  tealGreen:  new THREE.Color(0x0d6b4a),
  deepGreen:  new THREE.Color(0x083d26),
  accentGreen:new THREE.Color(0x17a86b),
  yellow:     new THREE.Color(0xd4c94a),
  paleYellow: new THREE.Color(0xf0e97a),
};

// Node count and connection threshold
const NODE_COUNT = 120;
const CONNECT_DIST = 22;
const FIELD_SIZE = 110;

// Node data
const nodes = [];
for (let i = 0; i < NODE_COUNT; i++) {
  nodes.push({
    pos: new THREE.Vector3(
      (Math.random() - 0.5) * FIELD_SIZE,
      (Math.random() - 0.5) * FIELD_SIZE,
      (Math.random() - 0.5) * FIELD_SIZE * 0.4
    ),
    vel: new THREE.Vector3(
      (Math.random() - 0.5) * 0.04,
      (Math.random() - 0.5) * 0.04,
      (Math.random() - 0.5) * 0.02
    ),
    phase: Math.random() * Math.PI * 2,
    speed: 0.4 + Math.random() * 0.8,
    // isYellow: randomly assign ~8% as yellow accent nodes
    isYellow: Math.random() < 0.08,
  });
}

// Node geometry (spheres as points via Points + custom shader)
const nodeMaterial = new THREE.ShaderMaterial({
  uniforms: {
    time: { value: 0 },
  },
  vertexShader: `
    attribute float nodePhase;
    attribute float isYellow;
    varying float vPhase;
    varying float vIsYellow;
    uniform float time;
    void main() {
      vPhase = nodePhase;
      vIsYellow = isYellow;
      float pulse = 1.0 + 0.3 * sin(time * 1.5 + nodePhase);
      gl_PointSize = mix(2.5, 6.0, isYellow) * pulse;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vPhase;
    varying float vIsYellow;
    void main() {
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      float alpha = 1.0 - smoothstep(0.2, 0.5, d);
      vec3 green = vec3(0.09, 0.65, 0.42);
      vec3 blue  = vec3(0.04, 0.31, 0.37);
      vec3 yellow= vec3(0.83, 0.79, 0.29);
      vec3 col = mix(mix(green, blue, sin(vPhase) * 0.5 + 0.5), yellow, vIsYellow);
      gl_FragColor = vec4(col, alpha);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const nodeGeom = new THREE.BufferGeometry();
const posArr   = new Float32Array(NODE_COUNT * 3);
const phaseArr = new Float32Array(NODE_COUNT);
const isYellowArr = new Float32Array(NODE_COUNT);

nodes.forEach((n, i) => {
  posArr[i * 3]     = n.pos.x;
  posArr[i * 3 + 1] = n.pos.y;
  posArr[i * 3 + 2] = n.pos.z;
  phaseArr[i] = n.phase;
  isYellowArr[i] = n.isYellow ? 1.0 : 0.0;
});

nodeGeom.setAttribute('position',  new THREE.BufferAttribute(posArr, 3));
nodeGeom.setAttribute('nodePhase', new THREE.BufferAttribute(phaseArr, 1));
nodeGeom.setAttribute('isYellow',  new THREE.BufferAttribute(isYellowArr, 1));
const nodePoints = new THREE.Points(nodeGeom, nodeMaterial);
scene.add(nodePoints);

// Edge lines — dynamically updated
const MAX_LINES = NODE_COUNT * 8;
const lineGeom = new THREE.BufferGeometry();
const linePosArr = new Float32Array(MAX_LINES * 6); // 2 verts per line
const lineColorArr = new Float32Array(MAX_LINES * 6); // rgb per vert
lineGeom.setAttribute('position', new THREE.BufferAttribute(linePosArr, 3).setUsage(THREE.DynamicDrawUsage));
lineGeom.setAttribute('color',    new THREE.BufferAttribute(lineColorArr, 3).setUsage(THREE.DynamicDrawUsage));
lineGeom.setDrawRange(0, 0);

const lines = new THREE.LineSegments(lineGeom, new THREE.LineBasicMaterial({
  vertexColors: true,
  transparent: true,
  opacity: 0.55,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
}));
scene.add(lines);

// Ambient fog-like overlay using a large transparent sphere mesh
const bgGeo = new THREE.PlaneGeometry(300, 300);
const bgMat = new THREE.MeshBasicMaterial({
  color: 0x030d0a, transparent: true, opacity: 0.0, side: THREE.DoubleSide,
});

// Mouse parallax
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// Helpers
const _colorA = new THREE.Color();
const _colorB = new THREE.Color();

function lerpColor(out, a, b, t) {
  out.r = a.r + (b.r - a.r) * t;
  out.g = a.g + (b.g - a.g) * t;
  out.b = a.b + (b.b - a.b) * t;
}

// Animation
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.008;

  nodeMaterial.uniforms.time.value = t;

  // Move nodes with organic perlin-ish drift
  const pos = nodeGeom.attributes.position;
  nodes.forEach((n, i) => {
    // Sinusoidal drift layered
    n.pos.x += Math.sin(t * n.speed + n.phase) * 0.018 + n.vel.x;
    n.pos.y += Math.cos(t * n.speed * 0.7 + n.phase + 1.2) * 0.018 + n.vel.y;
    n.pos.z += Math.sin(t * n.speed * 0.5 + n.phase + 2.4) * 0.012;

    // Soft boundary wrapping
    const half = FIELD_SIZE * 0.5;
    if (n.pos.x >  half) n.pos.x -= FIELD_SIZE;
    if (n.pos.x < -half) n.pos.x += FIELD_SIZE;
    if (n.pos.y >  half) n.pos.y -= FIELD_SIZE;
    if (n.pos.y < -half) n.pos.y += FIELD_SIZE;

    pos.setXYZ(i, n.pos.x, n.pos.y, n.pos.z);
  });
  pos.needsUpdate = true;

  // Rebuild edges
  let lineIdx = 0;
  const lpos = lineGeom.attributes.position;
  const lcol = lineGeom.attributes.color;

  for (let a = 0; a < NODE_COUNT && lineIdx < MAX_LINES; a++) {
    for (let b = a + 1; b < NODE_COUNT && lineIdx < MAX_LINES; b++) {
      const dx = nodes[a].pos.x - nodes[b].pos.x;
      const dy = nodes[a].pos.y - nodes[b].pos.y;
      const dz = nodes[a].pos.z - nodes[b].pos.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist < CONNECT_DIST) {
        const fade = 1 - dist / CONNECT_DIST;

        // Color: if either node is yellow → yellow tinge, else green/blue
        let colA, colB;
        if (nodes[a].isYellow || nodes[b].isYellow) {
          colA = COLORS.yellow;
          colB = COLORS.accentGreen;
        } else {
          colA = COLORS.accentGreen;
          colB = COLORS.midBlue;
        }

        lpos.setXYZ(lineIdx * 2,     nodes[a].pos.x, nodes[a].pos.y, nodes[a].pos.z);
        lpos.setXYZ(lineIdx * 2 + 1, nodes[b].pos.x, nodes[b].pos.y, nodes[b].pos.z);
        lcol.setXYZ(lineIdx * 2,     colA.r * fade, colA.g * fade, colA.b * fade);
        lcol.setXYZ(lineIdx * 2 + 1, colB.r * fade, colB.g * fade, colB.b * fade);
        lineIdx++;
      }
    }
  }
  lineGeom.setDrawRange(0, lineIdx * 2);
  lpos.needsUpdate = true;
  lcol.needsUpdate = true;

  // Gentle camera parallax
  camera.position.x += (mouseX * 6 - camera.position.x) * 0.03;
  camera.position.y += (-mouseY * 4 - camera.position.y) * 0.03;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
