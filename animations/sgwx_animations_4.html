<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020b08; overflow: hidden; }
  canvas { display: block; }
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
    background: radial-gradient(ellipse at 50% 50%,
      transparent 30%,
      rgba(2,8,6,0.55) 65%,
      rgba(1,5,3,0.92) 100%
    );
  }
  #grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 11; opacity: 0.045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }
</style>
</head>
<body>
<div id="vignette"></div>
<div id="grain"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Renderer ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x020b08, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020e09, 0.012);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 400);
camera.position.set(0, 0, 90);

// ─── Constants ───────────────────────────────────────────────────────────────
const NODE_COUNT   = 160;
const FIELD        = 120;
const CONNECT_DIST = 24;
const MAX_LINES    = NODE_COUNT * 10;
const PULSE_COUNT  = 40;

// ─── Nodes ───────────────────────────────────────────────────────────────────
const nodes = Array.from({ length: NODE_COUNT }, () => ({
  pos:    new THREE.Vector3((Math.random()-.5)*FIELD, (Math.random()-.5)*FIELD, (Math.random()-.5)*FIELD*.5),
  vel:    new THREE.Vector3((Math.random()-.5)*.03,   (Math.random()-.5)*.03,   (Math.random()-.5)*.015),
  phase:  Math.random() * Math.PI * 2,
  freq:   0.3 + Math.random() * 0.7,
  size:   Math.random(),
  isGold: Math.random() < 0.07,
}));

// ─── Node Points (custom shader) ─────────────────────────────────────────────
const nodeGeo = new THREE.BufferGeometry();
const nPos    = new Float32Array(NODE_COUNT * 3);
const nPhase  = new Float32Array(NODE_COUNT);
const nSize   = new Float32Array(NODE_COUNT);
const nGold   = new Float32Array(NODE_COUNT);
nodes.forEach((n, i) => {
  nPos[i*3]=n.pos.x; nPos[i*3+1]=n.pos.y; nPos[i*3+2]=n.pos.z;
  nPhase[i] = n.phase;
  nSize[i]  = n.size;
  nGold[i]  = n.isGold ? 1 : 0;
});
nodeGeo.setAttribute('position', new THREE.BufferAttribute(nPos,   3));
nodeGeo.setAttribute('aPhase',   new THREE.BufferAttribute(nPhase, 1));
nodeGeo.setAttribute('aSize',    new THREE.BufferAttribute(nSize,  1));
nodeGeo.setAttribute('aGold',    new THREE.BufferAttribute(nGold,  1));

const nodeMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    attribute float aPhase;
    attribute float aSize;
    attribute float aGold;
    varying float vGold;
    varying float vAlpha;
    void main() {
      vGold  = aGold;
      float pulse = 0.6 + 0.4 * sin(uTime * 1.2 + aPhase);
      vAlpha = pulse;
      float sz = mix(3.0, 9.0, aSize) * mix(1.0, 1.6, aGold) * pulse;
      gl_PointSize = sz;
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vGold;
    varying float vAlpha;
    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv);
      if (d > 0.5) discard;
      float core = 1.0 - smoothstep(0.0, 0.25, d);
      float glow = 1.0 - smoothstep(0.15, 0.5, d);
      vec3 greenCol = vec3(0.08, 0.72, 0.44);
      vec3 blueCol  = vec3(0.05, 0.42, 0.52);
      vec3 goldCol  = vec3(0.94, 0.87, 0.22);
      vec3 col = mix(mix(greenCol, blueCol, 0.4), goldCol, vGold);
      float a = (core * 0.9 + glow * 0.35) * vAlpha;
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Points(nodeGeo, nodeMat));

// ─── Edges ───────────────────────────────────────────────────────────────────
const edgeGeo = new THREE.BufferGeometry();
const ePos    = new Float32Array(MAX_LINES * 6);
const eColor  = new Float32Array(MAX_LINES * 6);
edgeGeo.setAttribute('position', new THREE.BufferAttribute(ePos,   3).setUsage(THREE.DynamicDrawUsage));
edgeGeo.setAttribute('color',    new THREE.BufferAttribute(eColor, 3).setUsage(THREE.DynamicDrawUsage));
edgeGeo.setDrawRange(0, 0);
const edgeMat = new THREE.LineBasicMaterial({
  vertexColors: true, transparent: true, opacity: 0.45,
  blending: THREE.AdditiveBlending, depthWrite: false,
});
scene.add(new THREE.LineSegments(edgeGeo, edgeMat));

const activeEdges = [];

// ─── Travelling Pulses ────────────────────────────────────────────────────────
const pulses = [];
const pulseGeo = new THREE.BufferGeometry();
const pPos     = new Float32Array(PULSE_COUNT * 3);
const pAlpha   = new Float32Array(PULSE_COUNT);
const pGold    = new Float32Array(PULSE_COUNT);
pulseGeo.setAttribute('position', new THREE.BufferAttribute(pPos,   3).setUsage(THREE.DynamicDrawUsage));
pulseGeo.setAttribute('aAlpha',   new THREE.BufferAttribute(pAlpha, 1).setUsage(THREE.DynamicDrawUsage));
pulseGeo.setAttribute('aGold',    new THREE.BufferAttribute(pGold,  1).setUsage(THREE.DynamicDrawUsage));
pulseGeo.setDrawRange(0, 0);

const pulseMat = new THREE.ShaderMaterial({
  uniforms: {},
  vertexShader: `
    attribute float aAlpha;
    attribute float aGold;
    varying float vAlpha;
    varying float vGold;
    void main() {
      vAlpha = aAlpha;
      vGold  = aGold;
      gl_PointSize = mix(5.0, 11.0, aGold);
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    varying float vGold;
    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv);
      if (d > 0.5) discard;
      float glow = 1.0 - smoothstep(0.0, 0.5, d);
      vec3 greenCol = vec3(0.15, 0.95, 0.55);
      vec3 goldCol  = vec3(1.0,  0.92, 0.25);
      gl_FragColor  = vec4(mix(greenCol, goldCol, vGold), glow * vAlpha * 0.9);
    }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Points(pulseGeo, pulseMat));

function spawnPulse() {
  if (pulses.length >= PULSE_COUNT || activeEdges.length === 0) return;
  const edge = activeEdges[Math.floor(Math.random() * activeEdges.length)];
  if (!edge) return;
  pulses.push({
    a: edge.a, b: edge.b,
    t: 0,
    speed: 0.004 + Math.random() * 0.008,
    isGold: nodes[edge.a].isGold || nodes[edge.b].isGold,
  });
}

// ─── Ambient Glow Blobs ───────────────────────────────────────────────────────
const BLOB_COUNT = 8;
const blobGeo    = new THREE.BufferGeometry();
const bPos       = new Float32Array(BLOB_COUNT * 3);
const bPhase     = new Float32Array(BLOB_COUNT);
for (let i = 0; i < BLOB_COUNT; i++) {
  bPos[i*3]   = (Math.random()-.5) * FIELD * 0.9;
  bPos[i*3+1] = (Math.random()-.5) * FIELD * 0.9;
  bPos[i*3+2] = (Math.random()-.5) * 20;
  bPhase[i]   = Math.random() * Math.PI * 2;
}
blobGeo.setAttribute('position', new THREE.BufferAttribute(bPos,   3));
blobGeo.setAttribute('aPhase',   new THREE.BufferAttribute(bPhase, 1));

const glowMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    attribute float aPhase;
    uniform float uTime;
    varying float vPhase;
    void main() {
      vPhase = aPhase;
      float breathe = 1.0 + 0.12 * sin(uTime * 0.4 + aPhase);
      gl_PointSize = 280.0 * breathe;
      gl_Position  = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    varying float vPhase;
    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv) * 2.0;
      float a  = 1.0 - smoothstep(0.0, 1.0, d);
      a = pow(a, 3.0) * 0.18;
      float t = sin(vPhase) * 0.5 + 0.5;
      vec3 col = mix(vec3(0.02, 0.28, 0.22), vec3(0.03, 0.18, 0.35), t);
      gl_FragColor = vec4(col, a);
    }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Points(blobGeo, glowMat));

// ─── Mouse ───────────────────────────────────────────────────────────────────
const mouse = { x: 0, y: 0 };
window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth  - 0.5) * 2;
  mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ─── Animate ─────────────────────────────────────────────────────────────────
let t = 0, lastSpawn = 0;
const camTarget = new THREE.Vector3();
let camTheta = 0;

function animate() {
  requestAnimationFrame(animate);
  t += 0.007;

  nodeMat.uniforms.uTime.value = t;
  glowMat.uniforms.uTime.value = t;

  // Move nodes
  const np = nodeGeo.attributes.position;
  nodes.forEach((n, i) => {
    n.pos.x += Math.sin(t * n.freq + n.phase)            * 0.022 + n.vel.x;
    n.pos.y += Math.cos(t * n.freq * 0.8 + n.phase + 1.3)* 0.022 + n.vel.y;
    n.pos.z += Math.sin(t * n.freq * 0.5 + n.phase + 2.7)* 0.010;
    const h = FIELD * 0.5;
    if (n.pos.x >  h) n.pos.x -= FIELD;
    if (n.pos.x < -h) n.pos.x += FIELD;
    if (n.pos.y >  h) n.pos.y -= FIELD;
    if (n.pos.y < -h) n.pos.y += FIELD;
    np.setXYZ(i, n.pos.x, n.pos.y, n.pos.z);
  });
  np.needsUpdate = true;

  // Rebuild edges
  activeEdges.length = 0;
  let ei = 0;
  const ep = edgeGeo.attributes.position;
  const ec = edgeGeo.attributes.color;
  for (let a = 0; a < NODE_COUNT && ei < MAX_LINES; a++) {
    for (let b = a + 1; b < NODE_COUNT && ei < MAX_LINES; b++) {
      const dx = nodes[a].pos.x - nodes[b].pos.x;
      const dy = nodes[a].pos.y - nodes[b].pos.y;
      const dz = nodes[a].pos.z - nodes[b].pos.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist < CONNECT_DIST) {
        const fade = Math.pow(1 - dist / CONNECT_DIST, 1.6);
        activeEdges.push({ a, b });
        const gold = (nodes[a].isGold || nodes[b].isGold) ? 1 : 0;
        const r  = gold ? 0.55 * fade : 0.04 * fade;
        const g  = gold ? 0.60 * fade : 0.55 * fade;
        const bl = gold ? 0.08 * fade : 0.42 * fade;
        ep.setXYZ(ei*2,   nodes[a].pos.x, nodes[a].pos.y, nodes[a].pos.z);
        ep.setXYZ(ei*2+1, nodes[b].pos.x, nodes[b].pos.y, nodes[b].pos.z);
        ec.setXYZ(ei*2,   r,       g,       bl);
        ec.setXYZ(ei*2+1, r*0.4,   g*0.4,   bl*0.4);
        ei++;
      }
    }
  }
  edgeGeo.setDrawRange(0, ei * 2);
  ep.needsUpdate = true;
  ec.needsUpdate = true;

  // Pulses
  if (t - lastSpawn > 0.18) { spawnPulse(); lastSpawn = t; }
  const pp = pulseGeo.attributes.position;
  const pa = pulseGeo.attributes.aAlpha;
  const pg = pulseGeo.attributes.aGold;
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    p.t += p.speed;
    if (p.t >= 1) { pulses.splice(i, 1); continue; }
    const na = nodes[p.a].pos, nb = nodes[p.b].pos;
    pp.setXYZ(i, na.x+(nb.x-na.x)*p.t, na.y+(nb.y-na.y)*p.t, na.z+(nb.z-na.z)*p.t);
    pa.setX(i, Math.sin(p.t * Math.PI));
    pg.setX(i, p.isGold ? 1 : 0);
  }
  pulseGeo.setDrawRange(0, pulses.length);
  pp.needsUpdate = true;
  pa.needsUpdate = true;
  pg.needsUpdate = true;

  // Camera: slow auto-orbit + mouse parallax
  camTheta += 0.0018;
  const tx = mouse.x * 8 + Math.sin(camTheta) * 12;
  const ty = -mouse.y * 5 + Math.sin(t * 0.15) * 8;
  camera.position.x += (tx - camera.position.x) * 0.025;
  camera.position.y += (ty - camera.position.y) * 0.025;
  camera.position.z  = 90 + Math.sin(t * 0.08) * 6;
  camera.lookAt(camTarget);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
